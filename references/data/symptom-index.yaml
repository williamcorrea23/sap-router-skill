      - "회사코드별로 페이먼트 메소드 활성화 안 돼있음"
    evidence_needed:
      - { type: transaction_log, target: "F110 run log", priority: critical }
      - { type: table_export, target: "LFB1 for vendor", priority: critical }
      - { type: table_export, target: "CDHDR CDPOS for LFB1 changes in last 24h", priority: high }
      - { type: screenshot, target: "FBZP Bank Determination", priority: medium }
    localized_checks:
