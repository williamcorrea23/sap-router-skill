    symptom_ko_variants:
      - "Cloud Integration 메시지 에러"
      - "iFlow 매핑 실패"
      - "CPI 메시지 retry 무한반복"
    symptom_en: "CPI iFlow messages keep failing (mapping/adapter error)"
    likely_modules: [IC]
    first_check_tcodes: [SXMB_MONI, SRT_MONI]
    typical_causes:
      - "Message/Value Mapping 오류 — 소스 구조 변경 후 미반영"
      - "Adapter 인증(credential/OAuth) 만료"
      - "Payload 스키마 검증 실패 (XSD/JSON schema)"
      - "Exception subprocess 미정의로 에러 메시지 적체"
    evidence_needed:
      - { type: transaction_log, target: "CPI Monitor — Message Processing (failed)", priority: critical }
      - { type: screenshot, target: "iFlow message mapping definition", priority: high }
      - { type: transaction_log, target: "S/4 SXMB_MONI (if SOAP/IDoc leg)", priority: medium }
    localized_checks:
      kr:
        - "한국 PG사(토스페이/KG이니시스) 연동 iFlow의 인증서 만료 여부"
    severity: high
    recurrence: frequent
    related_sap_notes: []

  - id: sym-ic-datasphere-replication-fail
    symptom_ko: "Datasphere Replication Flow가 실패/지연돼요"
    symptom_ko_variants:
      - "데이터스피어 복제 안 됨"
      - "SLT 리플리케이션 멈춤"
      - "delta queue 적체"
    symptom_en: "Datasphere Replication Flow fails or lags (SLT/delta queue)"
    likely_modules: [IC, SAC]
    first_check_tcodes: [LTRC, LTRS, ODQMON]
    typical_causes:
      - "SLT 마이그레이션 서버 부하 또는 job 중단 (LTRC)"
      - "Operational Delta Queue 적체 — 소비자 미동작 (ODQMON)"
      - "소스 테이블 구조 변경으로 매핑 깨짐"
      - "LTRS 고급 설정의 reading type/parallel 미튜닝"
    evidence_needed:
      - { type: transaction_log, target: "LTRC replication status / job log", priority: critical }
      - { type: transaction_log, target: "ODQMON delta queue backlog", priority: critical }
      - { type: screenshot, target: "Datasphere replication flow monitor", priority: high }
    localized_checks:
      kr:
        - "한국 데이터 레지던시 요건상 소스 컬럼 마스킹 적용 여부"
    severity: high
    recurrence: frequent
    related_sap_notes: []

  - id: sym-ic-cloud-connector-down
    symptom_ko: "Cloud Connector 연결이 끊겨서 온프레미스 연동이 안 돼요"
    symptom_ko_variants:
      - "클라우드 커넥터 다운"
      - "BTP에서 온프레 시스템 접근 불가"
    symptom_en: "Cloud Connector is down — on-premise connectivity broken"
    likely_modules: [IC]
    first_check_tcodes: [SICF, SM59]
    typical_causes:
      - "Cloud Connector 서비스 중단 또는 subaccount 연결 해제"
      - "Access Control에 백엔드 호스트/경로 미등록"
      - "S/4 측 ICF 서비스(SICF) 노드 inactive"
      - "방화벽/인증서 만료로 터널 재수립 실패"
    evidence_needed:
      - { type: screenshot, target: "Cloud Connector admin — connection state", priority: critical }
      - { type: screenshot, target: "Cloud Connector Access Control entries", priority: high }
      - { type: transaction_log, target: "S/4 SICF node status", priority: high }
    localized_checks:
      kr:
        - "한국 망분리 환경에서 DMZ 경유 터널 정책 확인"
    severity: high
    recurrence: occasional
    related_sap_notes: []

  - id: sym-ic-odata-auth-expired
    symptom_ko: "OData/SOAP 서비스 인증이 만료돼서 연동이 401 나요"
    symptom_ko_variants:
      - "OData 401 Unauthorized"
      - "SOAP 서비스 인증 실패"
      - "토큰 만료 연동 끊김"
    symptom_en: "OData/SOAP service auth expired — integration returns 401"
    likely_modules: [IC]
    first_check_tcodes: [SOAMANAGER, SICF, SAML2]
    typical_causes:
      - "OAuth client secret/certificate 만료"
      - "SOAMANAGER 측 binding의 인증 방식 불일치"
      - "Communication user 잠금/비밀번호 만료"
      - "SAML2 trust 인증서 rotation 미반영"
    evidence_needed:
      - { type: transaction_log, target: "S/4 SOAMANAGER — service binding auth", priority: critical }
      - { type: screenshot, target: "SAML2 / OAuth certificate validity", priority: high }
      - { type: transaction_log, target: "SICF error log (401 entries)", priority: high }
    localized_checks:
      kr:
        - "한국 인증서(공인/사설) 갱신 주기와 연동 인증서 동기화 여부"
    severity: high
    recurrence: occasional
    related_sap_notes: []

  - id: sym-ic-idoc-adapter-stuck
    symptom_ko: "CPI IDoc 어댑터 메시지가 처리 안 되고 쌓여요"
    symptom_ko_variants:
      - "IDoc 어댑터 멈춤"
      - "IDoc 메시지 적체"
      - "WE20 파트너 프로파일 에러"
    symptom_en: "CPI IDoc adapter messages stuck / piling up"
    likely_modules: [IC]
    first_check_tcodes: [WE20, WE21, IDX1, IDX2]
    typical_causes:
      - "Partner Profile(WE20) 인바운드/아웃바운드 파라미터 누락"
      - "Port(WE21)/IDX1 RFC destination 비정상"
      - "IDX2 메타데이터 미등록으로 변환 실패"
      - "tRFC/qRFC 큐 락 또는 적체"
    evidence_needed:
      - { type: transaction_log, target: "WE20 partner profile config", priority: critical }
      - { type: transaction_log, target: "IDX1/IDX2 port & metadata", priority: high }
      - { type: transaction_log, target: "CPI IDoc adapter channel status", priority: high }
    localized_checks:
      kr:
        - "한국 EDI(전자문서) 사업자와의 IDoc 포맷 합의 버전 확인"
    severity: medium
    recurrence: occasional
    related_sap_notes: []

  # ═══════════════════════════════════════════════
  # v2.3 B4 — 부족 모듈 보강 (BTP/ABAP/EWM/WM, likely_modules 5+ 보장)
  # ═══════════════════════════════════════════════

  - id: sym-btp-xsuaa-role-missing
    symptom_ko: "BTP 앱 접근 시 권한 없음 — XSUAA role-collection 미할당"
    symptom_ko_variants:
      - "BTP 앱 403 Forbidden"
      - "role collection 매핑 안 됨"
    symptom_en: "BTP app access denied — XSUAA role-collection not assigned"
    likely_modules: [BTP]
    first_check_tcodes: []
    typical_causes:
      - "사용자에게 role-collection 미할당 (BTP cockpit → Security)"
      - "xs-security.json scope/role-template 변경 후 재배포 누락"
      - "IdP(SAML/OIDC) 그룹 ↔ role-collection 매핑 불일치"
      - "subaccount/space 권한 경계 오류"
    evidence_needed:
      - { type: screenshot, target: "BTP cockpit — user role-collection assignment", priority: critical }
      - { type: screenshot, target: "xs-security.json scopes/role-templates", priority: high }
    localized_checks:
      kr:
        - "카카오/네이버 커스텀 IdP 그룹 매핑 반영 여부"
    severity: high
    recurrence: frequent
    related_sap_notes: []

  - id: sym-btp-destination-fail
    symptom_ko: "BTP Destination으로 백엔드 호출이 실패해요"
    symptom_ko_variants:
      - "Destination service 연결 실패"
      - "BTP에서 S/4 호출 안 됨"
    symptom_en: "BTP Destination service call to backend fails"
    likely_modules: [BTP, IC]
    first_check_tcodes: [SICF, SM59]
    typical_causes:
      - "Destination 설정의 URL/인증 타입 오류"
      - "Cloud Connector location ID 불일치"
      - "백엔드 ICF 서비스(SICF) inactive"
      - "토큰/인증서 만료"
    evidence_needed:
      - { type: screenshot, target: "BTP Destination — check connection result", priority: critical }
      - { type: screenshot, target: "Cloud Connector mapping / location ID", priority: high }
    localized_checks:
      kr:
        - "한국 망분리 DMZ 경유 시 location ID 분리 확인"
    severity: high
    recurrence: frequent
    related_sap_notes: []

  - id: sym-btp-cap-deploy-fail
    symptom_ko: "BTP CAP 앱 배포가 실패해요 (cf push / mta deploy)"
    symptom_ko_variants:
      - "CAP 배포 에러"
      - "mtar deploy 실패"
    symptom_en: "BTP CAP application deployment fails (cf push / mta deploy)"
    likely_modules: [BTP]
    first_check_tcodes: []
    typical_causes:
      - "service binding 누락 (HANA/XSUAA/destination)"
      - "mta.yaml resource/requires 정의 오류"
      - "quota(메모리/디스크) 초과"
      - "HDI container 마이그레이션 실패 (db deploy)"
    evidence_needed:
      - { type: transaction_log, target: "cf logs / mta deploy log", priority: critical }
      - { type: screenshot, target: "mta.yaml resources & bindings", priority: high }
    localized_checks:
      kr:
        - "Singapore 리전 quota 한도 — 한국 사용 패턴 대비 확인"
    severity: medium
    recurrence: occasional
    related_sap_notes: []

  - id: sym-btp-fiori-launchpad-blank
    symptom_ko: "BTP Fiori Launchpad에 타일이 안 보여요 (빈 화면)"
    symptom_ko_variants:
      - "Launchpad 타일 없음"
      - "Fiori 앱 안 뜸"
    symptom_en: "BTP Fiori Launchpad shows no tiles (blank)"
    likely_modules: [BTP]
    first_check_tcodes: []
    typical_causes:
      - "Catalog/Group에 앱 미할당 또는 role 미매핑"
      - "HTML5 app repository 배포 누락"
      - "Destination(앱 런타임) 연결 실패"
      - "Launchpad site 캐시 stale"
    evidence_needed:
      - { type: screenshot, target: "Launchpad site — catalog/role assignment", priority: critical }
      - { type: screenshot, target: "HTML5 app deployment status", priority: high }
    localized_checks:
      kr:
        - "한국어 i18n 리소스 번들 누락으로 렌더 실패 여부"
    severity: medium
    recurrence: occasional
    related_sap_notes: []

  - id: sym-abap-amdp-runtime-error
    symptom_ko: "AMDP/CDS에서 런타임 에러가 나요 (HANA push-down 실패)"
    symptom_ko_variants:
      - "AMDP 메소드 덤프"
      - "CDS view 활성화 실패"
    symptom_en: "AMDP/CDS runtime error (HANA push-down failure)"
    likely_modules: [ABAP]
    first_check_tcodes: [ST22, SE11, ST05]
    typical_causes:
      - "AMDP SQLScript 문법 오류 또는 미지원 함수"
      - "CDS view 의존 객체 비활성/순환 참조"
      - "HANA 권한(_SYS_REPO) 부족"
      - "Client handling/세션 변수 미설정"
    evidence_needed:
      - { type: transaction_log, target: "ST22 dump (AMDP/CDS)", priority: critical }
      - { type: transaction_log, target: "ST05 SQL trace", priority: high }
    localized_checks:
      kr:
        - "한글 데이터 codepage 변환이 push-down 로직에 영향 주는지"
    severity: high
    recurrence: occasional
    related_sap_notes: []

  - id: sym-ewm-wave-not-released
    symptom_ko: "EWM Wave가 릴리스 안 되거나 task가 안 생겨요"
    symptom_ko_variants:
      - "웨이브 릴리스 실패"
      - "Warehouse task 미생성"
    symptom_en: "EWM Wave not released / warehouse tasks not created"
    likely_modules: [EWM]
    first_check_tcodes: [SLG1]
    typical_causes:
      - "Wave template/조건 미충족 (capacity, cutoff)"
      - "Storage type/bin determination 오류"
      - "PPF(Post Processing Framework) action 실패"
      - "qRFC 큐 적체 (ERP-EWM 분산 시)"
    evidence_needed:
      - { type: transaction_log, target: "EWM Wave monitor — status", priority: critical }
      - { type: transaction_log, target: "SLG1 EWM application log", priority: high }
    localized_checks:
      kr:
        - "한국 3PL 위탁창고 연동 시 분산 EWM qRFC 확인"
    severity: high
    recurrence: occasional
    related_sap_notes: []

  - id: sym-wm-transfer-order-fail
    symptom_ko: "WM Transfer Order 생성/확인이 안 돼요 (legacy WM)"
    symptom_ko_variants:
      - "TO 생성 실패"
      - "LT03 전기 안 됨"
    symptom_en: "WM Transfer Order creation/confirmation fails (legacy WM)"
    likely_modules: [WM, MM]
    first_check_tcodes: [LT03, LT12, LS24]
    typical_causes:
      - "Storage bin/quant 데이터 불일치 (LS24)"
      - "Movement type ↔ WM reference 매핑 누락"
      - "Negative stock 또는 bin capacity 초과"
      - "IM-WM interface(LB10) 미동기"
    evidence_needed:
      - { type: transaction_log, target: "LS24 bin/quant status", priority: critical }
      - { type: screenshot, target: "movement type WM config", priority: high }
    localized_checks:
      kr:
        - "S/4 전환 시 WM→EWM 마이그레이션 대상 여부 (WM deprecated)"
    severity: medium
    recurrence: occasional
    related_sap_notes: []

  - id: sym-wm-im-wm-mismatch
    symptom_ko: "IM 재고와 WM 재고가 안 맞아요 (interface 불일치)"
    symptom_ko_variants:
      - "IM-WM 재고 차이"
      - "LB10 인터페이스 미처리"
    symptom_en: "IM stock and WM stock mismatch (interface inconsistency)"
    likely_modules: [WM, MM]
    first_check_tcodes: [LB10, LS24, LX23]
    typical_causes:
      - "LB10 transfer requirement 미처리 누적"
      - "Interim storage type(902/903 등) 미정리"
      - "동시 입출고로 IM/WM 타이밍 차이"
      - "LX23 재고비교에서 차이 미조정"
    evidence_needed:
      - { type: transaction_log, target: "LX23 IM vs WM stock comparison", priority: critical }
      - { type: transaction_log, target: "LB10 open transfer requirements", priority: high }
    localized_checks:
      kr:
        - "월마감 시 IM-WM 재고 일치 확인 절차 포함 여부"
    severity: medium
    recurrence: occasional
    related_sap_notes: []

meta:
  total: 90
  languages: [ko, en]
  language_coverage:
    ko: 90         # 전체 (원본) — 실측 (v2.3 B4: 신규 4모듈 +20, 부족모듈 +8)
    en: 90         # 전체
  # coverage 는 likely_modules 기준 실측값 (v2.3 B4 에서 옛 부정확 표기 정정)
  # 한 symptom 이 여러 모듈에 매핑되므로 합계 != total
  coverage:
    FI: 19
    MM: 15
    IC: 11         # Integration Cloud — CPI/Datasphere (cross-module 다수)
    SD: 10
    BASIS: 9
    BC: 8
    PP: 7
    CO: 6
    PM: 6
    SAC: 6
    ABAP: 5
    Ariba: 5
    BTP: 5
    EWM: 5
    HCM: 5
    IBP: 5
    QM: 5
    TR: 5
    WM: 3          # S/4HANA deprecated legacy — 의도적 3 (EWM 후속, 과투자 회피)
    KB: 0
  localization_consultants_planned:
    kr: present (built-in)
    de: planned v1.7 (sap-de-localization-consultant)
    us: planned v1.7 (sap-us-sox-consultant)
    jp: planned v1.7 (sap-jp-localization-consultant)
  notes: |
    이 인덱스는 v1.5.0 dog-food 용 초기 시드입니다. 실제 운영 케이스를 수집하면서
    반기마다 증상 엔트리를 확장할 예정입니다.

    v1.5.0에서 de/ja는 **3개 엔트리에만 시드**되었습니다. 나머지 17개 엔트리의
    de/ja 번역은 커뮤니티 컨트리뷰션 대상입니다. 번역 가이드: docs/i18n/symptom-index.md.

    매칭 알고리즘은 web/triage.js와 sap-session-start에서 독립적으로 구현되지만
    둘 다 같은 결과를 내야 합니다. 매칭은 fuzzy — tokenize + n-gram 유사도 기본.
    symptom_{lang}가 없으면 symptom_en으로 자동 폴백합니다.
