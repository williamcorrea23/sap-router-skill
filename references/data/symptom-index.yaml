      - "에프백십 No payment method 에러"
      - "페이먼트런 벤더 하나만 에러"
      - "페이런 돌렸는데 벤더 안 잡혀요"
    symptom_en: "F110 fails with 'No valid payment method found for vendor'"
    symptom_de: "F110 schlägt fehl mit 'Keine gültige Zahlungsmethode für Lieferant gefunden'"
    symptom_zh: "F110运行时某供应商出现'未找到有效付款方式'错误"
    symptom_ja: "F110実行時に特定仕入先で「有効な支払方法が見つかりません」エラー"
    likely_modules: [FI, TR]
    first_check_tcodes: [F110, XK03, FBZP, SE16N]
    typical_causes:
      - "벤더 마스터에 ZWELS(페이먼트 메소드, LFB1) 비어있음 — 제일 흔함"
