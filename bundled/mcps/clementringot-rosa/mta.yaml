_schema-version: "3.1"
ID: rosa
version: 1.14.0 # x-release-please-version

modules:
  - name: rosa
    type: nodejs
    path: .
    parameters:
      memory: 256M
      disk-quota: 512M
      health-check-type: http
      health-check-http-endpoint: /health
    properties:
      NODE_ENV: production
      TRANSPORT: http
    build-parameters:
      builder: npm
      build-result: dist
    requires:
      - name: rosa-xsuaa

resources:
  - name: rosa-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
