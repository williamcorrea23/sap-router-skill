    - textbox: "function rfc_read_table. *\"---------------------------------------------------------------------- *\"*\"Lokale Schnittstelle: *\" IMPORTING *\" VALUE(QUERY_TABLE) LIKE DD02L-TABNAME *\" VALUE(DELIMITER) LIKE SONV-FLAG DEFAULT SPACE *\" VALUE(NO_DATA) LIKE SONV-FLAG DEFAULT SPACE *\" VALUE(ROWSKIPS) LIKE SOID-ACCNT DEFAULT 0 *\" VALUE(ROWCOUNT) LIKE SOID-ACCNT DEFAULT 0 *\" VALUE(GET_SORTED) TYPE BOOLE_D OPTIONAL *\" VALUE(USE_ET_DATA_4_RETURN) TYPE BOOLE_D OPTIONAL *\" EXPORTING *\" VALUE(ET_DATA) TYPE SDTI_RESULT_TAB *\" TABLES *\" OPTIONS STRUCTURE RFC_DB_OPT OPTIONAL *\" FIELDS STRUCTURE RFC_DB_FLD OPTIONAL *\" DATA STRUCTURE TAB512 OPTIONAL *\" EXCEPTIONS *\" TABLE_NOT_AVAILABLE *\" TABLE_WITHOUT_DATA *\" OPTION_NOT_VALID *\" FIELD_NOT_VALID *\" NOT_AUTHORIZED *\" DATA_BUFFER_EXCEEDED *\"---------------------------------------------------------------------- * extended logic with note 2246160 (27.04.2021) * - check against system access rule RFC_READ_TABLE_TABL for table name (transaction SLDW) * - check against system access rule RFC_READ_TABLE_CALL for table name (transaction SLDW) * - SQL-Query check including SAL event EUU + raise TABLE_NOT_AVAILABLE * - new output format string line (no fixed column length) * - sort option for stable access to HANA * - ignore STRING and XSTRING in DATA output * - STRING/XTSTRING/Type P are supported in ET_DATA *----------------------------------------------------------------------- ************************************************************************* * * REMARK: * FUNCTION MODULE IS NOT SUPPORTED/ALLOWED FOR PRODUCTIVE USE * FUNCTION MODULE IS NOT SUPPORTED/ALLOWED FOR PRODUCTIVE USE * FUNCTION MODULE IS NOT SUPPORTED/ALLOWED FOR PRODUCTIVE USE * ( SAP NOTE 382318 ) * ************************************************************************* data: lo_read type ref to cl_rfc_read_table. \"----------------------------------------------------------------------- try. create object lo_read exporting id_table = query_table id_block_list_tabl = 'RFC_READ_TABLE_TABL' id_block_list_call = 'RFC_READ_TABLE_CALL' id_delim = delimiter id_no_data = no_data id_sort = get_sorted. if no_data = 'C'. et_data = lo_read->count_rows_only( it_selopt = options[] ). elseif use_et_data_4_return = abap_true. lo_read->get_table_content( exporting id_skip_rows = rowskips id_max_row = rowcount it_fields = fields[] it_selopt = options[] importing et_data = et_data et_fields = fields[] ). else. lo_read->get_table_content_512( exporting id_skip_rows = rowskips id_max_row = rowcount it_fields = fields[] it_selopt = options[] importing et_data = data[] et_fields = fields[] ). endif. catch cx_sais_raise_events. if ( sy-msgno = '131' and sy-msgid = 'DA' ). raise table_not_available. elseif ( sy-msgno = '099' and sy-msgid = 'SAIS' ) or ( sy-msgno = '072' and sy-msgid = 'SAIS' ). raise not_authorized. elseif ( sy-msgno = '718' and sy-msgid = 'AD' ). raise table_without_data. elseif ( sy-msgno = '559' and sy-msgid = 'AD' ). raise data_buffer_exceeded. elseif ( sy-msgno = '000' and sy-msgid = 'SAIS' ). raise option_not_valid. elseif ( sy-msgno = '223' and sy-msgid = 'SAIS' ). raise option_not_valid. endif. endtry. endfunction."
