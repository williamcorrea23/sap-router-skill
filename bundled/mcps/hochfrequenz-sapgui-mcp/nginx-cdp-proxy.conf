server {
    listen 9222;

    # Use Docker's internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    location / {
        # Use variable to force runtime resolution
        set $backend "host.docker.internal:9222";
        proxy_pass http://$backend;
        proxy_set_header Host localhost;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # WebSocket timeout settings (default is 60s which causes stale connections)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Rewrite WebSocket URLs in responses from ws://localhost to ws://host.docker.internal:9223
        sub_filter 'ws://localhost/' 'ws://host.docker.internal:9223/';
        sub_filter 'ws://localhost:9222/' 'ws://host.docker.internal:9223/';
        sub_filter_once off;
        sub_filter_types application/json;
    }
}
