name: "Linting"

on:
  push:
    branches: [main]
  pull_request: {}
jobs:
  pylint:
    name: Python Code Quality and Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        linter-env: ["linting", "type_check", "spell_check"]
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14
          # Cache pip's HTTP downloads. tox creates a fresh venv per run
          # but its inner ``pip install`` reuses ``~/.cache/pip``, so caching
          # here also speeds up the tox env build (see #629 for the incident
          # where a single virtualenv download stalled CI for 13 minutes).
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install tox
      - name: Run ${{ matrix.linter-env }} via Tox
        run: |
          tox -e ${{ matrix.linter-env }}
