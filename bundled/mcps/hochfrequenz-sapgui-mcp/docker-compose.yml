services:
  # Nginx proxy that rewrites Host header for Chrome DevTools Protocol
  # This is required because Chrome rejects CDP connections where Host != localhost
  cdp-proxy:
    image: nginx:alpine
    ports:
      - "9223:9222"
    volumes:
      - ./nginx-cdp-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  # SAP WebGUI MCP Server (for manual testing only)
  # Claude Desktop runs its own container with --network sapguimcp_default
  sapgui-mcp:
    build: .
    image: sapgui-mcp:test
    stdin_open: true
    environment:
      - BROWSER_MODE=connect
      - CDP_URL=http://cdp-proxy:9222
      - SAP_URL=${SAP_URL:-}
    volumes:
      - ~/.config/sap-mcp/systems.json:/home/appuser/.config/sap-mcp/systems.json:ro
    depends_on:
      - cdp-proxy
    profiles:
      - test
