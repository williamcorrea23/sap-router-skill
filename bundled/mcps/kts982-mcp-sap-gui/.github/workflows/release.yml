name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    # Publishing (PyPI trusted publishing, MCP registry OIDC) is bound to
    # GitHub; skip the whole pipeline on any other forge (e.g. Forgejo mirror).
    if: github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.tag.outputs.tag_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Capture tag
        id: tag
        run: echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        run: |
          python - <<'PY'
          import json
          import os
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          expected = f"v{version}"
          actual = os.environ["GITHUB_REF_NAME"]
          if actual != expected:
              raise SystemExit(f"Tag {actual!r} does not match package version {expected!r}")

          server = json.loads(Path("server.json").read_text(encoding="utf-8"))
          mismatches = [server["version"]] + [p["version"] for p in server["packages"]]
          if any(v != version for v in mismatches):
              raise SystemExit(f"server.json versions {mismatches!r} do not all match {version!r}")
          print(f"Verified tag {actual} matches package and server.json versions.")
          PY

      - name: Build distribution artifacts
        run: uv build

      - name: Generate checksums
        run: |
          python - <<'PY'
          import hashlib
          from pathlib import Path

          dist = Path("dist")
          lines = []
          for path in sorted(dist.iterdir()):
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              lines.append(f"{digest}  {path.name}")
          (dist / "SHA256SUMS.txt").write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-dist
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-dist
          path: dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          prerelease: ${{ contains(needs.build.outputs.tag_name, '-') }}
          files: |
            dist/*

  pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-dist
          path: dist

      - name: Remove non-distribution files
        run: rm -f dist/SHA256SUMS.txt

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  mcp-registry:
    needs: pypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish

