name: Release Please

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # A release created with GITHUB_TOKEN does NOT emit a `release: published`
      # event (GitHub blocks token-created events from triggering workflows), so
      # the deploy/sync workflows would never auto-run. Dispatch them explicitly:
      # workflow_dispatch is the one event GITHUB_TOKEN may trigger, so no PAT needed.
      - name: Trigger deploy + ABAP sync on new release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy-mcp-sap-docs.yml --ref main -R ${{ github.repository }}
          gh workflow run publish-sap-docs-ghcr.yml --ref main -R ${{ github.repository }}
          gh workflow run sync-to-abap-main.yml --ref main -R ${{ github.repository }}
