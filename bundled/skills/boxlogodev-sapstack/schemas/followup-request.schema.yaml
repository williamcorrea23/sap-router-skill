# schemas/followup-request.schema.yaml
# Follow-up Request — AI가 운영자에게 "다음에 수집해 달라"고 요청하는 구조화된 체크리스트
#
# 목적:
#   Evidence Loop의 Turn 2(Hypothesis) 말미에 AI가 생성한다.
#   운영자는 이걸 들고 SAP 시스템에서 실제 조회/캡처/익스포트를 수행한다.
#
# 핵심 원칙:
#   1. 각 요청은 반드시 어느 hypothesis_id를 검증하려는지 명시 (감사 추적)
#   2. 운영자의 노동 시간을 존중 — priority와 estimated_minutes로 부담 가시화
#   3. 모든 요청은 "read-only"가 기본 — 데이터 수정 요청은 confirm_destructive 플래그 필수
#   4. 프로덕션 데이터 편집(SE16N UPDATE 등)은 절대 요청할 수 없음 (스키마 레벨 금지)

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://boxlogodev.github.io/sapstack/schemas/followup-request.schema.yaml"
title: "Follow-up Request"
description: "Structured 'please collect this next' checklist generated by the AI at the end of a Hypothesis turn"
type: object
required: [request_id, session_id, turn_number, created_at, checks]
additionalProperties: false

properties:
  request_id:
    type: string
    pattern: "^flr-[0-9]{8}-[a-z0-9]{6}$"

  session_id:
    type: string
    pattern: "^sess-[0-9]{8}-[a-z0-9]{6}$"

  turn_number:
    type: integer
    minimum: 2
    description: "Follow-up requests only exist from Turn 2 onward (never at Intake)"

  created_at:
    type: string
    format: date-time

  summary:
    type: string
    maxLength: 500
    description: "One-paragraph summary shown to the operator: 'Here's why I'm asking'"

  estimated_total_minutes:
    type: integer
    minimum: 1
    maximum: 480
    description: "AI's estimate of how long all checks will take an experienced operator"

  checks:
    type: array
    minItems: 1
    maxItems: 15
    description: "Individual check items. Keep small (max 15) to avoid operator fatigue."
    items:
      $ref: "#/$defs/CheckItem"

  escalation_hint:
    type: object
    description: "If the operator cannot perform some checks, what to escalate"
    properties:
      to_role:
        type: string
        enum: [basis, security, functional_consultant, developer, auditor, none]
      reason:
        type: string

$defs:
  CheckItem:
    type: object
    required: [check_id, purpose, hypothesis_ids, action, priority]
    additionalProperties: false
    properties:
      check_id:
        type: string
        pattern: "^chk-[0-9]{3}$"

      purpose:
        type: string
        maxLength: 300
        description: "Why we're asking for this. Operator-facing explanation."

      hypothesis_ids:
        type: array
        minItems: 1
        items:
          type: string
          pattern: "^h-[0-9]{3}$"
        description: "Which hypotheses this check will validate or falsify"

      action:
        type: object
        description: "What the operator should actually do"
        required: [type]
        properties:
          type:
            type: string
            enum:
              - run_tcode              # Execute a T-code with parameters and capture screen
              - query_table            # SE16N browse read-only
              - export_report          # Run report/ALV and export
              - capture_screenshot     # Take screenshot of current state
              - read_dump              # Read ST22 dump text
              - check_config           # SPRO/IMG configuration read
              - check_note_status      # Check SNOTE for note X
              - check_authorization    # SUIM/PFCG read-only
              - read_log               # SM21/SLG1 read
              - other                  # Describe in description
          tcode:
            type: string
            description: "e.g. F110, SE16N — must exist in data/tcodes.yaml"
          table:
            type: string
          report:
            type: string
          parameters:
            type: object
            additionalProperties: { type: string }
            description: "Selection-screen parameters, e.g. {RUN_ID: '...', RUNDATE: '...'}"
          fields_of_interest:
            type: array
            items: { type: string }
            description: "Only these fields matter — reduces data volume to operator"
          description:
            type: string
            maxLength: 1000
            description: "Free-text instructions when structured action is insufficient"

      expected_outcome:
        type: string
        maxLength: 500
        description: "What finding would confirm/refute the hypothesis. Operator can skip collection if clearly opposite."

      priority:
        type: string
        enum: [critical, high, medium, low]
        description: |
          critical: without this, AI cannot advance
          high: narrows down to single hypothesis
          medium: disambiguates between two hypotheses
          low: nice-to-have, skip if time pressed

      estimated_minutes:
        type: integer
        minimum: 1
        maximum: 60
        description: "Per-check time estimate"

      confirm_destructive:
        type: boolean
        default: false
        description: |
          MUST be false for read-only actions (query_table, capture_screenshot, etc).
          Schema validation rejects any check with destructive implications.
          sapstack NEVER asks operators to modify production data via this schema.

      safe_to_skip:
        type: boolean
        default: false
        description: "If true, operator can defer and the loop still advances"

      output_format:
        type: string
        enum: [screenshot_png, csv_export, text_paste, xlsx_export, pdf_export]
        description: "Preferred return format — shapes the next Evidence Bundle item"

# ─────────────────────────────────────────────────────────────
# Example (informational):
#
# request_id: flr-20260411-b8m2nc
# session_id: sess-20260411-m2p9xt
# turn_number: 2
# created_at: 2026-04-11T09:25:00+09:00
# summary: |
#   증상은 "벤더 100234의 F110 Proposal 실패 — No valid payment method".
#   세 가지 가설을 세웠습니다. 아래 4개 확인으로 70% 이상 가려낼 수 있습니다.
# estimated_total_minutes: 15
# checks:
#   - check_id: chk-001
#     purpose: "LFB1의 지급방법(ZWELS)이 비었는지 확인 — H1(벤더 마스터 결손) 검증"
#     hypothesis_ids: [h-001]
#     action:
#       type: query_table
#       table: LFB1
#       parameters: { LIFNR: "100234", BUKRS: "*" }
#       fields_of_interest: [LIFNR, BUKRS, ZWELS, ZAHLS, AKONT]
#     expected_outcome: "ZWELS가 공란이면 H1 확정. 값이 있으면 H1 기각."
#     priority: critical
#     estimated_minutes: 3
#     output_format: csv_export
#   - check_id: chk-002
#     purpose: "FBZP Bank Determination에서 해당 지급방법의 House Bank 매핑"
#     hypothesis_ids: [h-002]
#     action:
#       type: capture_screenshot
#       tcode: FBZP
#       description: "Bank determination → Ranking order + Accounts 화면 캡처"
