# sapstack — 확정된 SAP T-code 리스트 (모듈별)
#
# 목적: scripts/check-tcodes.sh가 SKILL.md의 T-code를 이 리스트와 대조하여
# 오탈자·존재하지 않는 T-code를 탐지합니다.
#
# 엔트리 형식:
#   <T-CODE>:
#     name: 한 줄 설명
#     modules: [FI, CO, MM, ...]   # 해당 T-code가 속한 모듈
#     release: both | ecc_only | s4_only | s4_2021+
#     note: 선택적 부가 정보 (예: deprecated, replaced_by)
#
# 업데이트 원칙:
#   - ECC vs S/4HANA에서 동작이 달라진 경우 release 필드로 명시
#   - 확실하지 않은 T-code는 등록 금지 (과소 등록이 과잉 등록보다 낫다)
#   - 한국 특화 T-code는 modules에 BC 또는 KR 태그 추가

