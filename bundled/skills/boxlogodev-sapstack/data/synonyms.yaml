    meaning: "Reference day minus one. 마감 기준일 하루 전"
    notes: "월마감 D-1 = 마감일 하루 전 = 최종 점검일"
    zh: { primary: "D-1", variants: ['前一天', 'D-1工作日'] }
    vi: { primary: "D-1", variants: ['Hôm trước', 'Ngày D-1'] }

  - canonical: d_day
    ko: "D-Day"
    ko_variants: ["디데이", "D-0", "기준일", "당일"]
    meaning: "Target execution day"

  - canonical: beginning_of_month
    ko: "월초"
    ko_variants: ["월 초", "BOM", "beginning of month", "월초반"]
    meaning: "First few business days of a month"

  - canonical: end_of_month
    ko: "월말"
    ko_variants: ["월 말", "EOM", "end of month", "월말경"]
    meaning: "Last few business days of a month"

  - canonical: monthly_close
    ko: "월마감"
    ko_variants: ["월 마감", "monthly close", "월결산", "월결"]
    meaning: "Monthly closing process (보통 익월 D+3~D+5 영업일)"

  - canonical: quarterly_close
    ko: "분기마감"
    ko_variants: ["분기 마감", "Q마감", "quarterly close", "분기결산"]
    meaning: "End-of-quarter close — 감사 대상"

  - canonical: year_end_close
    ko: "연마감"
    ko_variants: ["연 마감", "연말결산", "year-end close", "결산", "확정결산"]
    meaning: "Year-end close — K-IFRS + 세법 + 외부감사 대응"

  - canonical: semi_annual
    ko: "반기"
    ko_variants: ["반기결산", "H1", "H2", "상반기", "하반기", "semi-annual"]
    meaning: "Half-year reporting period (H1=1-6월, H2=7-12월)"

  - canonical: preliminary_close
    ko: "가결산"
    ko_variants: ["가 결산", "가결", "preliminary close", "잠정결산", "임시결산"]
    meaning: "Preliminary close before final numbers"

  - canonical: final_close
    ko: "확정결산"
    ko_variants: ["확정 결산", "final close", "정식 결산"]
    meaning: "Final, audited close"

  - canonical: business_day
    ko: "영업일"
    ko_variants: ["영업 일", "근무일", "business day", "평일"]
    meaning: "Business working day (주말·공휴일 제외)"
    ja: { primary: "営業日", variants: ['業務日'] }
    de: { primary: "Geschäftstag" }

  - canonical: d_day_plus_n
    ko: "D+N"
    ko_variants: ["디플러스엔", "익일", "익월", "D+1", "D+3", "D+5"]
    meaning: "N days after reference day"
    notes: |
