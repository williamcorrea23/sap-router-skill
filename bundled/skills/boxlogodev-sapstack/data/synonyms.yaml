    zh: { primary: "D+n", variants: ['D日后n天', 'D+N'] }
    vi: { primary: "D+n", variants: ['Ngày D cộng n', 'D+N'] }

  - canonical: provisional
    ko: "잠정치"
    ko_variants: ["잠정 치", "prelim", "잠정값", "임시값"]
    meaning: "Provisional / not-yet-finalized value"

  - canonical: finalized
    ko: "확정치"
    ko_variants: ["확정 치", "final", "확정값"]
    meaning: "Finalized / audit-ready value"

  - canonical: monthly_recurring
    ko: "월정"
    ko_variants: ["월 정", "monthly recurring", "월마다"]
    meaning: "Monthly recurring process"

