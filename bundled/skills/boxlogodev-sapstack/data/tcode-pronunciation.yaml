# data/tcode-pronunciation.yaml
# SAP T-code 현장 발음 사전
#
# 목적:
#   엔드유저/운영자가 음성이나 텍스트로 표현하는 T-code의 한국어 발음을
#   매칭 엔진이 T-code 원형으로 정규화할 수 있게 한다.
#
# 사용처:
#   - web/triage.js, mcp/server.ts의 extractTcodes() 보완
#   - symptom-index.yaml의 symptom_ko_variants 검증 시 참조
#
# 발음 표기 원칙:
#   - 한국 SAP 컨설턴트/키 유저의 일상 발화 기준
#   - 숫자는 한국어 숫자명으로 ("100"→"백", "22"→"이십이")
#   - 영문자는 한국 음차 ("F"→"에프", "SE"→"에스이")
#   - 같은 T-code에 여러 발음이 있으면 모두 수록 (지역·세대 편차)
#
# 주의:
#   이 파일은 "감사 공식 발음"이 아니라 "커뮤니케이션용 발음"입니다.
#   공식 T-code 레지스트리는 data/tcodes.yaml을 참조하세요.

