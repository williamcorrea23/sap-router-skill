# sapstack Continue.dev Configuration
#
# Continue.dev (https://continue.dev/) 는 VS Code·JetBrains용 오픈소스 AI 어시스턴트로,
# context provider와 rules를 통해 프로젝트별 지침을 주입할 수 있습니다.
#
# 이 파일을 프로젝트의 `.continue/` 디렉토리에 두면 Continue가 자동 인식합니다.
# 또는 Continue 설정에서 "include this file"로 지정할 수 있습니다.

name: sapstack-rules
schema: v1

rules:
  - name: sapstack-universal
    rule: |
      이 프로젝트는 sapstack(SAP 운영 자문 플러그인) 저장소입니다.
      모든 SAP 관련 답변은 다음 규칙을 따릅니다:

      1. NEVER hardcode company codes, G/L accounts, cost centers, org units
      2. ALWAYS ask user for SAP release, deployment model, company code before answering
      3. ALWAYS distinguish ECC vs S/4HANA behavior explicitly
      4. Transport request required for any config change
      5. Simulate before actual run (AFAB, F.13, FAGL_FC_VAL, MR11, F110)
      6. Never recommend SE16N data edits in production
      7. Always provide T-code + SPRO menu path
      8. Only cite SAP Notes that exist in data/sap-notes.yaml

      Response format:
      ## Issue / ## Root Cause / ## Check (T-code + Table.Field) /
      ## Fix / ## Prevention / ## SAP Note

context:
  - provider: file
    params:
      path: AGENTS.md
  - provider: file
    params:
      path: CLAUDE.md
  - provider: folder
    params:
      folder: plugins
      pattern: "**/SKILL.md"
  - provider: file
    params:
      path: data/tcodes.yaml
  - provider: file
    params:
      path: data/sap-notes.yaml

# ────────────────────────────────────────────────────
# 사용법
# ────────────────────────────────────────────────────
#
# 1. 프로젝트에 sapstack을 submodule로 추가:
#    git submodule add https://github.com/BoxLogoDev/sapstack sapstack
#
# 2. Continue VS Code 확장에서 이 파일 경로를 config에 추가하거나,
#    sapstack/.continue/config.yaml을 프로젝트 루트 .continue/로 심볼릭 링크:
#    ln -s sapstack/.continue/config.yaml .continue/config.yaml
#
# 3. Continue가 SAP 파일 편집 시 sapstack 규칙을 자동 적용
#
# 자세한 내용: docs/multi-ai-compatibility.md
