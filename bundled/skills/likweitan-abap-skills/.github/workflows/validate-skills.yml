name: Validate skills

on:
  push:
    paths:
      - "skills/**"
      - "scripts/validate_skills.py"
      - ".github/workflows/validate-skills.yml"
  pull_request:
    paths:
      - "skills/**"
      - "scripts/validate_skills.py"
      - ".github/workflows/validate-skills.yml"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv run python scripts/validate_skills.py
