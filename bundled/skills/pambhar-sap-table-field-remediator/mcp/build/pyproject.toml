[project]
name = "sap-simplification-kb"
version = "0.1.0"
description = "Knowledge layer + local MCP server over SAP's S/4HANA Simplification List (shared infra for the Custom Code Analyzer skills)."
requires-python = ">=3.12"
dependencies = [
    "fastmcp>=2.0",
    "pyyaml>=6.0",
]

# `build_index.py` only needs pyyaml (above). Rebuilding the chunk store from the PDF
# additionally needs docling — kept optional so the server stays lightweight to install.
[project.optional-dependencies]
build = [
    "docling>=2.107.0",
]
