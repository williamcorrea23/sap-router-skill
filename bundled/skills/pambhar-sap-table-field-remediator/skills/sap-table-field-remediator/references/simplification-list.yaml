# Remediation Catalog — the skill's RUNTIME classification catalog (the remediator skill MAY see this).
#
# ROLE: this is the file catalog.py loads at runtime to classify findings. It is discovered by the
# literal name `simplification-list.yaml` ($CATALOG -> ./ground-truth/ -> ./ -> this bundled copy), so
# the FILENAME is a discovery contract with the eval harness / a user's working dir — do not rename it.
# Conceptually it is the "Remediation Catalog" (see README "Three names, kept distinct"), NOT the raw SAP
# Simplification List. The MCP knowledge-base build keeps its OWN separate copy at
# mcp/common/kb-index-catalog.yaml (join-keys only); the two are independent — edits here do not propagate.
#
# Phase 1 deliverable. This is the curated, corrected catalog the skill is allowed to read
# (the production analogue of the SAP Simplification DB + the Deloitte KB). It was originally
# derived from an internal Deloitte KB and SAP S/4HANA "what's new" (S4TWL) notes, now folded
# directly into this file; those source files are not shipped in the repo.
#
# IMPORTANT corrections applied vs the raw KB (do NOT regress these):
#   - CDPOS/CDHDR: KB said CDPOS -> CDPOS_STR/CDPOS_UID. THOSE TABLES DO NOT EXIST. Reality: the
#     CDCLS cluster is declustered on HANA, so CDPOS/CDHDR become transparent tables of the SAME
#     NAME. A plain SELECT keeps working. Catalogued here as DECLUSTERED_SAME_NAME / low impact so a
#     well-behaved skill does NOT flag a read as a must-fix. Used as the over-claim distractor.
#   - VBUK/VBUP: still physically present in S/4 but NOT populated for new docs (silent empty joins).
#   - KNA1/LFA1: still exist and stay populated via CVI; a plain read often still works -> verify-leaning.
#   - BSEG/MKPF/MSEG: still exist (compat views); the *correct* target is the RELEASED CDS view
#     (I_JournalEntryItem / I_MaterialDocument*) — ACDOCA/MATDOC are the underlying compat store.
#
# Field semantics:
#   object            ECC table or field name
#   type              table | field | bapi | function_module
#   status            VALID | CHANGED | RENAMED | ABOLISHED | RESTRUCTURED |
#                     DECLUSTERED_SAME_NAME | REDIRECT_BP | MODERNIZATION_ONLY
#   s4_replacement    where/what to read in S/4 (or "<same>" / null)
#   cds_view          released CDS view, or null
#   world             A | A-verify | B | B-verify        (must-I-fix axis)
#   release_dependent bool (bites only on certain target releases / settings)
#   baseline_tier     T1 | T2 | T3 | null   (the catalog's *default* judgment cost; a specific
#                     usage can escalate above this — see findings.yaml must_escalate)
#   sap_note          verified S4TWL note, or null
#   fix_pattern       one-line remediation summary
#   source            sap-s4twl | deloitte-kb | corrected:<reason>

catalog:

  # ----------------------------------------------------------------------------
  # World A — genuine S/4 readiness findings (custom code must be remediated)
  # ----------------------------------------------------------------------------

  - object: MATNR
    type: field
    status: CHANGED                       # length extended 18 -> 40
    s4_replacement: MATNR                  # same field, now length 40
    cds_view: I_Product
    world: A
    release_dependent: true               # extended length off by default after conversion
    baseline_tier: T1                      # mechanical IF only read/moved/displayed; T3 if offset-parsed
    sap_note: "2267140"
    fix_pattern: "Ensure no hardcoded CHAR18 target / fixed-length WRITE. Offset/substring access -> escalate (see findings must_escalate)."
    source: sap-s4twl

  - object: KONV
    type: table
    status: ABOLISHED                      # cluster table removed
    s4_replacement: PRCD_ELEMENTS          # transparent, same field names (1909+)
    cds_view: V_KONV                       # compatibility view; SAP prefers pricing API
    world: A
    release_dependent: false
    baseline_tier: T1                      # 1:1 rename for a pure READ SELECT
    sap_note: "2220005"                    # cookbook 2267308
    fix_pattern: "Read: swap KONV -> PRCD_ELEMENTS (identical fields). WRITE (INSERT/UPDATE/DELETE) is FORBIDDEN in S/4 -> escalate to T3 (use pricing API)."
    source: sap-s4twl

  - object: VBUK
    type: table
    status: ABOLISHED                      # data model eliminated; table present-but-unpopulated
    s4_replacement: VBAK                    # header status folded into header table(s)
    cds_view: I_SalesOrder
    world: A
    release_dependent: false
    baseline_tier: T2
    sap_note: "2198647"                    # S4TWL 2267306
    fix_pattern: "Drop VBUK join; re-point header status (GBSTK etc.) onto VBAK/LIKP/VBRK by doc category. Silent empty join if left as-is."
    source: sap-s4twl

  - object: VBUP
    type: table
