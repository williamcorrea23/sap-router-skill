    entities: [program-ZABAPGIT_STANDALONE]
    description: "How does the object integrate with the SAP repository/transport layer and with remote Git?"
    hypothesis: "It serialises SAP repository objects and synchronises them with a remote Git host over HTTP(S) via clone -> add/commit(push) -> pull; an offline ZIP import/export mode covers air-gapped/SSL-restricted landscapes. This is the functional face of the L1 footprint (TADIR, E070/E071, REPOSRC, DD02L). [VERIFIED: slices/abapgit-standalone-demo/research/2026-07-03-online-workflow.md:29-33]"
    confidence: high
