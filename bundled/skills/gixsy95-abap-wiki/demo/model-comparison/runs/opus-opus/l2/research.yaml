    entities: [program-ZABAPGIT_STANDALONE, table-ZABAPGIT]
    description: "Who populates the ZABAPGIT table, what does it hold, and what is its volume/retention?"
    hypothesis: "ZABAPGIT is abapGit's own persistence table (settings/repo configuration), written/read dynamically by abapGit itself (MODIFY/SELECT (c_tabname='ZABAPGIT')) on demand; no batch populator. In this system it is effectively empty (fixture never run). [VERIFIED: slices/abapgit-standalone-demo/research/2026-07-03-persistence-credentials.md:35-42]"
    confidence: high
    status: auto-answered
    resolution: { evidence: e6, note: "L1: dynamic MODIFY/SELECT on c_tabname='ZABAPGIT', abapGit's own persistence; no external populator." }

