bug_candidates:
- id: BUG-001
  severity: SMELL
  type: SMELL
  location: whole report (abapmerge marker, lines 152991-152996)
  description: 'Vendored/generated monolith: the entire abapGit tool (~153k physical
    lines, hundreds of zcl_abapgit_*/zif_abapgit_* classes and interfaces) is concatenated
    into ONE executable report by abapmerge 0.16.8. It is not meant to be edited in
    place; any fix must be made in the modular upstream source and re-merged. Standard
    ATC/where-used/unit-test reasoning does not apply object-by-object.'
  fix_proposed: Treat as a read-only vendored artifact. For local changes use the
    abapGit developer (modular) edition or the sanctioned user-exit includes (zabapgit_user_exit,
    zabapgit_authorizations_exit, zabapgit_background_user_exit) rather than editing
    the merged file.
- id: BUG-002
  severity: MINOR
  type: PERFORMANCE
  location: get_item_from_filename, lines 92651-92655
  description: 'SELECT * FROM tadir INTO CORRESPONDING FIELDS OF TABLE with a wildcard
    obj_name LIKE lv_obj_name (a 14-char prefix followed by ''%'') and no MAX ROWS
    / package size. On systems with many SICF nodes this scans a wide slice of TADIR
    into memory. The developers acknowledge it with ##TOO_MANY_ITAB_FIELDS and #EC
    CI_GENBUFF pragmas.'
  fix_proposed: Restrict the field list to the columns actually used and/or add generic-buffer-aware
    paging; upstream abapGit concern, not an ACME defect.
- id: BUG-003
  severity: SMELL
  type: SMELL
  location: lcl_startup=>get_package_from_adt, lines 152761-152795
  description: 'Blanket CATCH cx_root ##NO_HANDLER swallows every error of the dynamic
    ADT-context access (CREATE DATA / dynamic CALL METHOD). Documented as intentional
    (''fail silently''), but it also hides genuine defects in the dynamic path behind
    a silent RETURN.'
  fix_proposed: Narrow the catch to the expected dynamic-access exceptions or at least
    log the swallowed error; by-design upstream, flagged for awareness only.
