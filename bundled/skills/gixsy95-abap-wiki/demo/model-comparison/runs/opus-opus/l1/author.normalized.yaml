narrative_sections:
  executive_summary: '- `ZABAPGIT_STANDALONE` is the **standalone distribution of
    abapGit**, the open-source Git client for ABAP (see http://www.abapgit.org, MIT-licensed)
    - bundled version **1.133.0** [VERIFIED: CL-004].

    - It is **not** a business report: the whole tool (hundreds of `zcl_abapgit_*`/`zif_abapgit_*`
    classes and interfaces) is concatenated into a **single ~153,000-line executable
    report by abapmerge 0.16.8** [VERIFIED: CL-005]. Everything referenced with the
    `zcl_abapgit_*`/`zif_abapgit_*` prefix is defined *inside this same file* and
    is therefore a self-reference, not an external dependency.

    - Runtime shell: `INITIALIZATION` strips the toolbar + inits the login dialog;
    `START-OF-SELECTION` -> `PERFORM run` -> authorization check + migrations + `open_gui`
    [VERIFIED: CL-001][VERIFIED: CL-002].

    - Two screens: **1001** is an empty dummy that hosts the interactive HTML GUI;
    **1002** is the git **login/password popup** (`p_url`, `p_user`, `p_pass`, `p_cmnt`)
    [VERIFIED: CL-006][VERIFIED: CL-007].

    - Dual execution mode: **online GUI** (HTML viewer control) or **background**
    (`sy-batch` -> `zcl_abapgit_background=>run`) [VERIFIED: CL-003] - pattern `selection-screen-report`
    + `batch-job`.

    - External footprint: own persistence table **ZABAPGIT** (custom) [VERIFIED: CL-009]
    plus heavy read/write of **standard repository/DDIC tables** (TADIR, E070/E071,
    REPOSRC, DD02L, TVDIR, TDDAT) [VERIFIED: CL-010], and a few dynpro/selection-screen
    FMs (`RPY_DYNPRO_READ/INSERT`, `RS_SET_SELSCREEN_STATUS`) [VERIFIED: CL-011][VERIFIED:
    CL-012].

    - Bug candidates: 0 BLOCKER / 0 MAJOR / 1 MINOR / 2 SMELL = 3 - all are *characteristics
    of vendored/generated code*, not ACME defects; conventional per-object bug-hunting
    does not apply here.

    '
  functional_scope: '## What it does (business view)

    abapGit is a Git client written entirely in ABAP: it serialises repository objects
    (programs, classes, DDIC, etc.) to files, computes their Git blobs/trees, talks
    to remote Git repositories over HTTP, and deserialises pulled objects back into
    the system. `ZABAPGIT_STANDALONE` is the **single-file, ready-to-run** packaging
    of that tool: paste-and-activate one report, run it, and drive everything from
    an interactive HTML GUI. The bundled release is **1.133.0** [VERIFIED: CL-004],
    produced by **abapmerge 0.16.8** which flattens the modular developer edition
    into one report [VERIFIED: CL-005].


    This is third-party open-source code living in a custom (`Z`) package; the analysis
    below documents the **report shell** (events, FORMs, screens, the standard-object
    footprint) rather than re-deriving every one of the hundreds of merged classes.


    ## Modes

    - **Interactive GUI** (default, `sy-batch = abap_false`): `open_gui` computes
    the start action from SPA/GPA `DBT` (`go_db` in emergency database-util mode,
    otherwise `go_home`), calls `zcl_abapgit_ui_factory=>get_gui( )->go_home` and
    triggers the UI with `CALL SELECTION-SCREEN 1001` [VERIFIED: CL-003]. The GUI
    is rendered in an HTML viewer control hosted on the dummy screen 1001.

    - **Background** (`sy-batch = abap_true`): control is handed to `zcl_abapgit_background=>run`
    for unattended pull/push jobs [VERIFIED: CL-003] - hence the `batch-job` pattern.

    - **Login popup** (screen 1002): a modal selection screen used to collect git
    credentials on demand (see §Selection screen / Input mapping).


    ## Use cases (INFERRED from the tool''s nature)

    1. Developer pulls/pushes ABAP objects to/from a remote Git repository via the
    interactive GUI.

    2. Scheduled background job synchronising a repository (`zcl_abapgit_background=>run`).

    3. Emergency database-util access via SPA/GPA `DBT = ''ZABAPGIT''` (`go_db`).


    ## Known caller

    Normally launched via the abapGit transaction / a user-created transaction on
    this report; there is no `SUBMIT` to it in this file and no wiki where-used is
    available, so the concrete caller is [UNVERIFIABLE] from the source alone.

    '
  selection_screen: '### Screens

    - **1001** - `SELECTION-SCREEN BEGIN OF SCREEN 1001 ... END OF SCREEN 1001`: an
    explicitly commented *dummy for triggering screen on Java SAP GUI*; it carries
    no fields and exists only to give the HTML GUI control a screen to live on [VERIFIED:
    CL-006].

    - **1002** - the **login popup**, `TITLE sc_title`, with four `PARAMETERS` [VERIFIED:
    CL-007]:


    | Name | Type | Modifiers | Notes |

    |------|------|-----------|-------|

    | `p_url` | `string` | `LOWER CASE`, display-only (`screen-input=''0''`) | repo
    URL, filled by the program, not typed by the user |

    | `p_user` | `string` | `LOWER CASE` | git user name |

    | `p_pass` | `c LENGTH 255` | `LOWER CASE`, masked (`screen-invisible=''1''`)
    | git password / PAT |

    | `p_cmnt` | `c LENGTH 255` | `LOWER CASE`, display-only | the note "Press F1
    for Help" |


    `TABLES sscrfields` backs the `AT SELECTION-SCREEN` command handling.


    ### AT SELECTION-SCREEN OUTPUT / events

    `on_screen_output` loops over `SCREEN`, disabling input on `P_URL`/`P_CMNT`, showing
    the comment fields and masking `P_PASS`, then sets a `DETL` status (borrowed from
    program `RSPFPAR`) excluding `PICK`, and parks the cursor on `P_PASS` [VERIFIED:
    CL-006]. `AT SELECTION-SCREEN` routes the popup ucomm to `lcl_password_dialog=>on_screen_event`
    (OK -> confirm, HELP/F1 -> open the authentication wiki page, otherwise cancel).

    '
  input_mapping: 'The only genuine user input with a demonstrable flow is the **login
    popup** (screen 1002). `p_url` and `p_cmnt` are program-populated display fields,
    so they are not user-input channels; `p_user` and `p_pass` are the two typed fields
    that flow out of the report as git credentials (see the structured `input_mapping`
    block). On confirm, `lcl_password_dialog=>popup` copies them into the `CHANGING`
    parameters `cv_user`/`cv_pass` of `FORM password_popup`; on cancel it clears them,
    and it always `CLEAR`s the screen fields afterwards so the password is not retained
    [VERIFIED: CL-008]. The password field is masked on screen (`screen-invisible
    = ''1''`).

    '
  form_analysis: 'The report-level logic lives in a handful of FORMs and two local
    classes at the tail of the merged file (`lcl_password_dialog`, `lcl_startup`);
    everything else is OO.


    ### RUN (lines 152802-152820)

    - **Purpose**: single entry point invoked from `START-OF-SELECTION`.

    - **Algorithm**: (1) `zcl_abapgit_auth=>is_allowed( ...startup )` - raise if not
    authorised; (2) `zcl_abapgit_migrations=>run`; (3) `PERFORM open_gui`.

    - **Error handling**: `TRY` around all three, catching `zcx_abapgit_exception`
    and `zcx_abapgit_not_found`, each surfaced as `MESSAGE ... TYPE ''E''` [VERIFIED:
    CL-002].


    ### OPEN_GUI (lines 152822-152848)

    - **Purpose**: decide between background and interactive GUI.

    - **Algorithm**: if `sy-batch` -> `zcl_abapgit_background=>run`; else read SPA/GPA
    `DBT`, map `''ZABAPGIT''`->`go_db` / else `go_home`, set HTML debug mode from
    `DBT=''HREF''`, `lcl_startup=>prepare_gui_startup`, `get_gui( )->go_home`, `CALL
    SELECTION-SCREEN 1001` [VERIFIED: CL-003].


    ### OUTPUT (lines 152850-152876)

    - **Purpose**: `AT SELECTION-SCREEN OUTPUT` handler for screen 1001.

    - **Algorithm**: `PERFORM set_pf_status IN PROGRAM rsdbrunt IF FOUND`; exclude
    `CRET`/`SPOS`; `RS_SET_SELSCREEN_STATUS`; unless variant maintenance, `get_gui(
    )->set_focus` (errors shown as `S` DISPLAY LIKE `E`) [VERIFIED: CL-012].


    ### EXIT (lines 152878-152902)

    - **Purpose**: `AT SELECTION-SCREEN ON EXIT-COMMAND` handler.

    - **Algorithm**: only for `sy-dynnr = 1001`; on `CBAC`/`CCAN` (Back/Escape) call
    `get_gui( )->back( graceful )`; if it returns "end of stack" then `free( )` (graceful
    shutdown), else `LEAVE TO SCREEN 1001` [VERIFIED: CL-017].


    ### ADJUST_TOOLBAR (lines 152904-152965)

    - **Purpose**: hide the standard report toolbar so the HTML GUI owns the screen.

    - **Algorithm**: `RPY_DYNPRO_READ` of `sy-cprog`/`pv_dynnr`, set `no_toolbar`,
    `RPY_DYNPRO_INSERT` with `suppress_exist_checks`; all errors ignored ("just exit")
    [VERIFIED: CL-011].


    ### lcl_startup=>prepare_gui_startup / get_package_from_adt (lines 152659-152798)

    Resolves which repo to open at startup from three sources (SPA/GPA repo key, SPA/GPA
    package, or the **ADT** package obtained by dynamically calling `CL_ADT_GUI_INTEGRATION_CONTEXT=>read_context`).
    The ADT branch is wrapped in a blanket `CATCH cx_root ##NO_HANDLER` [VERIFIED:
    CL-016].


    ### lcl_password_dialog (lines 152414-152558)

    Local-by-design login dialog driving screen 1002; see Input mapping [VERIFIED:
    CL-008].

    '
  external_dependencies: '> Everything prefixed `zcl_abapgit_*` / `zif_abapgit_*`
    is defined **inside this same merged report** and is therefore excluded as a self-reference.
    The list below is the **external (standard) footprint** plus abapGit''s own DB
    table.


    ### Tables

    | Table | Namespace | Type | Usage |

    |-------|-----------|------|-------|

    | ZABAPGIT | custom | DB (persistence) | own settings/repo persistence, dynamic
    `MODIFY/SELECT (c_tabname)` where `c_tabname=''ZABAPGIT''` [VERIFIED: CL-009]
    |

    | TADIR | standard | DB (repository dir.) | object lookup, `SELECT *`/`SELECT
    SINGLE` [VERIFIED: CL-010] |

    | E070 / E071 | standard | DB (transport) | transport owner / object list [VERIFIED:
    CL-010] |

    | REPOSRC | standard | DB (report sources) | program existence / last user [VERIFIED:
    CL-010] |

    | DD02L | standard | DB (DDIC tables) | table existence checks [VERIFIED: CL-010]
    |

    | TVDIR / TDDAT | standard | DB customising | table-maintenance deserialization
    (`MODIFY tvdir`/`MODIFY tddat`) |


    (Representative, not exhaustive - the object handlers touch many more standard
    repository tables across the 153k lines.)


    ### Function modules

    | FM | Usage |

    |----|-------|

    | RS_SET_SELSCREEN_STATUS | selection-screen GUI status of screens 1001/1002 [VERIFIED:
    CL-012] |

    | RPY_DYNPRO_READ / RPY_DYNPRO_INSERT | strip the report toolbar in `adjust_toolbar`
    [VERIFIED: CL-011] |


    ### Classes

    | Class | Package | Usage |

    |-------|---------|-------|

    | CL_ADT_GUI_INTEGRATION_CONTEXT | standard (ADT) | dynamic `read_context` to
    get the ADT start package [VERIFIED: CL-016] |

    | CL_HTTP_UTILITY | standard | `string_to_fields` / `unescape_url` for ADT parameters
    |


    ### SUBMIT / external PERFORM

    `PERFORM set_pf_status IN PROGRAM rsdbrunt IF FOUND` - borrows the PF-status set
    routine of standard program **RSDBRUNT** (FORM output).


    ### Include architecture (extension points)

    The merged report ends with four optional `INCLUDE ... IF FOUND` user-exit hooks
    - `zabapgit_authorizations_exit`, `zabapgit_user_exit`, `zabapgit_background_user_exit`,
    `zabapgit_gui_pages_userexit` - the sanctioned place for local customisation without
    touching the generated body (rendered by the pipeline in the Program structure
    section, not listed as dependencies).

    '
  performance: '### Assessment

    The report shell performs no mass-data extraction of its own [VERIFIED: CL-013].
    The DB cost is spread across the merged object handlers, which read repository/DDIC
    tables mostly as `SELECT SINGLE` or narrowly-filtered reads (existence checks
    on DD02L/REPOSRC, transport owner on E070). The one pattern worth flagging is
    the SICF handler''s `SELECT * FROM tadir INTO CORRESPONDING FIELDS OF TABLE` with
    a wildcard `obj_name LIKE` and no row cap [VERIFIED: CL-015], which the authors
    already annotate with suppression pragmas.


    ### SELECT census (representative)

    | Line | Context | Table | Shape |

    |------|---------|-------|-------|

    | 92651 | get_item_from_filename (SICF) | TADIR | `SELECT *` + `obj_name LIKE`,
    no cap |

    | 72472 | e071 filter | E071 | `SELECT DISTINCT` + `trkorr IN` |

    | 84503 | last-changed user | E070 | `SELECT SINGLE as4user` |

    | 74899 | program existence | REPOSRC | `SELECT SINGLE progname` |

    | 74072 | table existence | DD02L | `SELECT SINGLE tabname` |

    | 73253/73261 | persistence | ZABAPGIT | dynamic `MODIFY`/`SELECT SINGLE` |


    ### Recommendations

    1. None actionable locally - performance changes belong to the abapGit upstream
    project, not to the merged artifact.

    2. If a specific handler is a hotspot in this system, raise it upstream (or trace
    via MCP at L2); the wildcard TADIR read (§BUG-002) is the first candidate.

    '
  error_handling: '### Pattern

    The shell converts abapGit''s exception hierarchy to user messages at the top
    level: `FORM run` catches `zcx_abapgit_exception`/`zcx_abapgit_not_found` -> `MESSAGE
    ''E''` [VERIFIED: CL-002]; `output`/`exit` show GUI errors as `MESSAGE ... TYPE
    ''S'' DISPLAY LIKE ''E''` to avoid aborting the screen [VERIFIED: CL-012][VERIFIED:
    CL-017]. `adjust_toolbar` deliberately ignores all FM errors [VERIFIED: CL-011].


    ### Anomaly

    `lcl_startup=>get_package_from_adt` swallows every error of the dynamic ADT access
    with a blanket `CATCH cx_root ##NO_HANDLER` [VERIFIED: CL-016]; documented as
    intentional but it hides real failures behind a silent `RETURN` (BUG-003).


    ### COMMIT / ROLLBACK

    No explicit `COMMIT WORK` in the report shell; DB writes to the persistence table
    go through `MODIFY (c_tabname)` inside the persistence class, and transactional
    control is handled by the merged services, not the shell.

    '
