narrative_sections:
  executive_summary: '- **What it is**: `ZABAPGIT_STANDALONE` is the **abapGit standalone
    distribution** - the entire open-source abapGit Git client for ABAP, merged into
    ONE executable report so it can be installed without abapGit itself. It self-reports
    `c_abap_version = 1.133.0` / `c_xml_version = v1.0.0`. [VERIFIED: CL-001]

    - **Architecture**: a single `REPORT ... LINE-SIZE 100` of **152,996 physical
    lines** [VERIFIED: CL-012], produced by **abapmerge 0.16.8** (2026-07-01) [VERIFIED:
    CL-017]; a thin report shell of **6 FORM routines** [VERIFIED: CL-013] drives
    hundreds of inlined `zcl_abapgit_*` classes and `zif_abapgit_*` interfaces (113
    forward declarations alone) [VERIFIED: CL-016]. All those classes/interfaces are
    **internal to this compilation unit**, so they are NOT dependencies.

    - **Execution modes**: interactive (HTML GUI via `CALL SELECTION-SCREEN 1001`)
    and **batch** (`sy-batch` -> `zcl_abapgit_background=>run( )`) [VERIFIED: CL-003][VERIFIED:
    CL-004]. Entry: `START-OF-SELECTION -> PERFORM run` -> auth check + migrations
    + `open_gui` [VERIFIED: CL-002].

    - **Not business code**: this is a **third-party developer tool** (MIT-licensed,
    bundles ajson v1.1.13) [VERIFIED: CL-019]; there is no <COMPANY> business logic
    to document here. Its real output is an **interactive HTML application UI**, not
    a report/ALV/file.

    - **Genuine external touchpoints** are standard-SAP: dynpro FMs (`RPY_DYNPRO_READ/INSERT`,
    `RS_SET_SELSCREEN_STATUS`) and deep repository/dictionary tables (`TADIR`, `E070/E071`,
    `REPOSRC`, `TRDIR`) [VERIFIED: CL-007][VERIFIED: CL-009].

    - **Findings (governance, not code defects)**: 2 SMELL/SECURITY red flags - (1)
    a 153k-line merged artifact that must never be hand-edited; (2) a tool with broad
    object-write/transport capability gated only by the abapGit auth check [VERIFIED:
    CL-017][VERIFIED: CL-018].

    - No `ltcl_*` local test classes bundled [VERIFIED: CL-022]; no ATC/TR data (requires
    MCP).

    '
  functional_scope: '## What it does (business view)


    abapGit is an **open-source Git client for ABAP**: it serialises repository objects

    (classes, programs, DDIC, etc.) to Git-friendly files, computes diffs, and pulls/pushes

    them against a remote Git repository - giving a development team version control
    and a

    transport-independent object exchange. This particular object, `ZABAPGIT_STANDALONE`,
    is

    the **"standalone" packaging**: the complete abapGit codebase flattened by *abapmerge*
    into

    a single report so it can be installed as one object (bootstrap install). It self-identifies

    as abapGit and prints its own version in the "About" page (`c_abap_version = 1.133.0`).

    [VERIFIED: CL-001][VERIFIED: CL-019]


    The precise <COMPANY> usage - which repositories, branching policy, who operates
    it - is an

    organisational matter that the code cannot prove. [INFERRED: CL-020]


    ## Modes

    - **Interactive** (default, online): renders the abapGit HTML UI on selection
    screen 1001. [VERIFIED: CL-003]

    - **Batch**: when `sy-batch = abap_true`, runs `zcl_abapgit_background=>run( )`
    (headless pull/push). [VERIFIED: CL-004]

    - **Emergency DB util**: `GET PARAMETER ID ''DBT''` may route the GUI straight
    to the database-util page. [VERIFIED: CL-003]


    ## Scale

    The merged bundle inlines the whole abapGit object model: 113 `INTERFACE ... DEFERRED`

    forward declarations open the file, followed by hundreds of class definitions
    and

    implementations. [VERIFIED: CL-016] Because every `zcl_abapgit_*` / `zif_abapgit_*`
    /

    `zcx_abapgit_*` artifact is defined **inside this same report**, referencing them
    is

    internal, not an external dependency (rule 8).


    ## Extension points

    The report ends with four optional `INCLUDE ... IF FOUND` user-exit hooks

    (`zabapgit_authorizations_exit`, `zabapgit_user_exit`, `zabapgit_background_user_exit`,

    `zabapgit_gui_pages_userexit`) that a site may supply to plug in custom auth,
    exits and

    background logic. These are INCLUDE arcs (handled deterministically by the pipeline),
    not

    dependencies.

    '
  selection_screen: 'Two selection screens are declared. [VERIFIED: CL-015]


    ### Screen 1001 - GUI host (dummy)

    `SELECTION-SCREEN BEGIN/END OF SCREEN 1001` is an empty screen whose sole purpose
    is to

    trigger the HTML GUI container (needed on SAPGUI for Java). [VERIFIED: CL-005]
    It carries no

    `PARAMETERS`/`SELECT-OPTIONS`.


    ### Screen 1002 - password dialog

    | Name | Type | Modifiers | Notes |

    |------|------|-----------|-------|

    | `p_url`  | `string` | `LOWER CASE VISIBLE LENGTH 60` | Repo URL, display-only
    (input disabled at PBO) |

    | `p_user` | `string` | `LOWER CASE VISIBLE LENGTH 60` | Git user name |

    | `p_pass` | `c(255)` | `LOWER CASE VISIBLE LENGTH 60` | Password/token, rendered
    invisible |

    | `p_cmnt` | `c(255)` | `LOWER CASE VISIBLE LENGTH 60` | Static note ("Press F1
    for Help") |


    The dialog is driven by the local class `lcl_password_dialog`: `AT SELECTION-SCREEN
    OUTPUT`

    masks `p_pass` and disables `p_url`; `AT SELECTION-SCREEN` handles OK/HELP/Escape.
    [VERIFIED: CL-005]

    `TABLES sscrfields` provides the function-code work area shared by both screens.


    There is **no classic data-extraction selection screen** - this is an interactive

    application, not a report driven by selection criteria.

    '
  input_mapping: 'The only classic selection-screen inputs are the **password-dialog**
    fields (screen 1002);

    screen 1001 has none. `p_user` and `p_pass` flow into the `CHANGING` parameters
    of

    `FORM password_popup` / `lcl_password_dialog=>popup` and are returned to the git-auth

    caller **only on confirm** (`gv_confirm = abap_true`); `p_url` is display-only.
    [VERIFIED: CL-006]

    See the structured `input_mapping` block for the field-level flow.

    '
  form_analysis: "The report shell is a thin driver of exactly **6 FORM routines**\
    \ [VERIFIED: CL-013];\nall real work lives in the inlined classes.\n\n### run\
    \ (152802-152820)\n- **Purpose**: top-level entry from `START-OF-SELECTION`. [VERIFIED:\
    \ CL-002]\n- **Algorithm**: `TRY` -> if `zcl_abapgit_auth=>is_allowed( startup\
    \ ) = abap_false` raise; then\n  `zcl_abapgit_migrations=>run( )`; then `PERFORM\
    \ open_gui`. `CATCH zcx_abapgit_exception` /\n  `zcx_abapgit_not_found` -> `MESSAGE\
    \ ... TYPE 'E'`. [VERIFIED: CL-002]\n- **Error handling**: exceptions converted\
    \ to E-messages (see Error handling).\n\n### open_gui (152822-152848)\n- **Purpose**:\
    \ choose interactive vs batch and start the GUI.\n- **Algorithm**: if `sy-batch`\
    \ -> `zcl_abapgit_background=>run( )`; else `GET PARAMETER ID 'DBT'`\n  to pick\
    \ `go_db`/`go_home`, set debug mode, `lcl_startup=>prepare_gui_startup( )`,\n\
    \  `get_gui( )->go_home( )`, `CALL SELECTION-SCREEN 1001`. [VERIFIED: CL-003][VERIFIED:\
    \ CL-004]\n\n### output (152850-152876)\n- **Purpose**: `AT SELECTION-SCREEN OUTPUT`\
    \ handler for screen 1001.\n- **Algorithm**: `PERFORM set_pf_status IN PROGRAM\
    \ rsdbrunt IF FOUND` [VERIFIED: CL-011];\n  `RS_SET_SELSCREEN_STATUS` excluding\
    \ `CRET`/`SPOS` [VERIFIED: CL-008]; then `set_focus( )`\n  unless variant maintenance\
    \ (`MESSAGE ... TYPE 'S' DISPLAY LIKE 'E'` on failure).\n\n### exit (152878-152902)\n\
    - **Purpose**: `AT SELECTION-SCREEN ON EXIT-COMMAND` for screen 1001 only (`sy-dynnr\
    \ = 1001`).\n- **Algorithm**: on Back/Escape (`CBAC`/`CCAN`) calls `get_gui( )->back(\
    \ )`; frees the GUI at\n  end of stack, else `LEAVE TO SCREEN 1001`.\n\n### adjust_toolbar\
    \ (152904-152965)\n- **Purpose**: at `INITIALIZATION`, add/remove the dynpro toolbar\
    \ for variant maintenance.\n- **Algorithm**: `RPY_DYNPRO_READ` the screen, flip\
    \ `no_toolbar` based on\n  `is_variant_maintenance( )`, `RPY_DYNPRO_INSERT` it\
    \ back; errors ignored (`RETURN`). [VERIFIED: CL-007]\n\n### password_popup (152559-152573)\n\
    - **Purpose**: `##CALLED` wrapper invoked by the git layer to prompt for credentials.\n\
    - **Algorithm**: delegates to `lcl_password_dialog=>popup`, which shows screen\
    \ 1002 and, on\n  confirm, returns `p_user`/`p_pass` via its `CHANGING` parameters.\
    \ [VERIFIED: CL-006]\n"
  output_mapping: '**This object does not fit the standard output-mapping model.**
    Its primary output is an

    **interactive HTML application UI** rendered in the SAPGUI HTML viewer by the
    internal

    `zcl_abapgit_gui` framework (hundreds of renderer classes), triggered by

    `get_gui( )->go_home( )` and hosted on screen 1001. [VERIFIED: CL-003] There is
    **no

    DDIC-field -> output-column lineage**: the HTML is computed by program logic,
    not projected

    from dictionary rows, so the standard `ALV`/`file`/`email`/`spool` channels do
    not apply.


    The only shell-level, line-verifiable outputs are the **exception messages** surfaced
    to the

    user (`MESSAGE lx_exception TYPE ''E''` etc. in `run`/`output`). Both are captured
    in the

    structured `output_mapping` block with `kind: computed` and descriptive channel
    labels

    (`html-gui`, `sapgui-message`) chosen because no standard-channel enum value fits
    an

    interactive developer GUI.

    '
  external_dependencies: 'Because the whole abapGit object model is inlined, the genuine
    dependencies are all

    **standard SAP**. The list below is the fully-read report shell plus a **verified
    sample**

    of the deep repository/dictionary access - the bundle actually touches hundreds
    of standard

    objects (563 `CALL FUNCTION` sites, ~387 `SELECT`s); an exhaustive enumeration
    is deferred

    (raw-only limit). [UNVERIFIABLE: CL-021]


    ### Tables (standard, sampled)

    | Table | Usage | Evidence |

    |-------|-------|----------|

    | TADIR | object author lookup (`SELECT SINGLE author`) | [VERIFIED: CL-009] |

    | E070  | transport request owner (`SELECT SINGLE as4user`) | [VERIFIED: CL-009]
    |

    | E071  | transport object entries (`SELECT DISTINCT ... `) | [VERIFIED: CL-009]
    |

    | REPOSRC | report source directory / active state | [VERIFIED: CL-009] |

    | TRDIR | program attributes (`subc`) | [VERIFIED: CL-009] |


    ### Function modules (standard, report shell)

    | FM | Usage | Evidence |

    |----|-------|----------|

    | RPY_DYNPRO_READ | read GUI dynpro in `adjust_toolbar` | [VERIFIED: CL-007] |

    | RPY_DYNPRO_INSERT | rewrite dynpro toolbar | [VERIFIED: CL-007] |

    | RS_SET_SELSCREEN_STATUS | selection-screen GUI status in `output` | [VERIFIED:
    CL-008] |


    ### Classes (standard)

    - `CL_HTTP_UTILITY` - `string_to_fields`/`unescape_url` for ADT start-package
    parameters.

    - `CL_ADT_GUI_INTEGRATION_CONTEXT` - dynamic `read_context` to obtain the ADT
    start package.


    ### SUBMIT (standard)

    Exactly 5 `SUBMIT` statements. [VERIFIED: CL-014] The shell-visible one is

    `SUBMIT scpr3 AND RETURN` (BC Set handling). [VERIFIED: CL-010] There is also
    an external

    `PERFORM set_pf_status IN PROGRAM rsdbrunt`. [VERIFIED: CL-011]


    ### DDIC structure

    - `TABLES sscrfields` - selection-screen function codes (screens 1001/1002).

    '
  performance: 'The program is **152,996 lines** [VERIFIED: CL-012] and its cost is
    dominated by the deep,

    inlined object-serialization / diff engine, not by the report shell. Raw-only
    L1 **cannot**

    profile that call tree (hundreds of classes, ~387 `SELECT`s) or measure real runtime.

    [UNVERIFIABLE: CL-021]


    A concrete, verifiable example of a DB-heavy access is the transport-filter read

    `SELECT DISTINCT pgmid object obj_name FROM e071 ... ORDER BY ...` - a DB-side
    sort over the

    transport-object table. [VERIFIED: CL-009] The shell itself (`run`/`open_gui`/`output`)

    performs no data extraction; the two dynpro FMs in `adjust_toolbar` run once at

    `INITIALIZATION`. [VERIFIED: CL-007]


    ### Recommendation

    Treat performance as an upstream (abapGit) concern; do not attempt local optimisation
    of a

    merged artifact. For heavy operations (serialize/compare of large packages) run
    abapGit in

    **background mode** (`sy-batch` path). [VERIFIED: CL-004]

    '
  error_handling: "### Message / exception map\n| Point | Trigger | Behaviour |\n\
    |-------|---------|-----------|\n| FORM run (152814-152815) | `zcx_abapgit_exception`\
    \ during auth/migrations/open_gui | `MESSAGE lx_exception TYPE 'E'` [VERIFIED:\
    \ CL-002] |\n| FORM run (152816-152817) | `zcx_abapgit_not_found` | `MESSAGE lx_not_found\
    \ TYPE 'E'` [VERIFIED: CL-002] |\n| FORM output (152871-152872) | `set_focus(\
    \ )` fails | `MESSAGE lx_error TYPE 'S' DISPLAY LIKE 'E'` (non-fatal) |\n| FORM\
    \ exit (152898-152899) | GUI back/free fails | `MESSAGE lx_error TYPE 'S' DISPLAY\
    \ LIKE 'E'` |\n| FORM adjust_toolbar | any `RPY_DYNPRO_*` error | silently `RETURN`\
    \ (best-effort toolbar tweak) [VERIFIED: CL-007] |\n\n### Notes\n- There is **no\
    \ COMMIT/ROLLBACK in the shell**; persistence is owned by the inlined\n  abapGit\
    \ persistence classes.\n- The shell pattern is disciplined: exceptions are caught\
    \ at the report boundary and turned\n  into user messages rather than dumping.\
    \ The `adjust_toolbar` \"ignore errors\" is deliberate\n  (a cosmetic toolbar\
    \ adjustment must not break startup).\n"
