bug_candidates:
- id: BUG-001
  severity: SMELL
  type: SMELL
  location: whole program (abapmerge marker, lines 152992-152995)
  description: Monolithic 152,996-line single report generated by abapmerge 0.16.8
    and bundled into the custom package ZABAPGIT. This is the abapGit standalone distribution,
    not bespoke <COMPANY> business code. Hand-editing any part desyncs it from the
    upstream build and can break the abapmerge structure/version markers.
  fix_proposed: Maintain only by replacing the entire program from the official abapGit
    standalone build; never hand-edit. Track the upstream version (c_abap_version
    = 1.133.0) in the wiki.
- id: BUG-002
  severity: SMELL
  type: SECURITY
  location: FORM run (152808), FORM adjust_toolbar (152942), serializer SUBMIT (95845)
  description: 'Broad developer capability concentrated in one report: it generates/rewrites
    dynpros via RPY_DYNPRO_INSERT (152942) and can SUBMIT standard maintenance programs
    such as scpr3 (95845); startup is guarded only by the abapGit authorization check
    zcl_abapgit_auth=>is_allowed( startup ) (152808) plus standard S_DEVELOP. Governance/
    security relevance for a production system, where a Git client can read/write
    repository objects and transports.'
  fix_proposed: Confine to controlled clients / non-production, restrict via S_DEVELOP
    and the abapGit auth exit (ZCL_ABAPGIT_AUTH_EXIT), and document who may run it.
