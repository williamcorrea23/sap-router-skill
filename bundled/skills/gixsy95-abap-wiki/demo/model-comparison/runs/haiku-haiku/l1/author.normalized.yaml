  performance: '### SELECT census [VERIFIED: CL-011]

    - **SELECT * occurrences**: 70 across the whole file (grep count). Spot-checked
    samples show most carry WHERE clauses and often ORDER BY PRIMARY KEY (e.g. OBJSL
    line 75630, DOKIL line 79459).

    - **Unfiltered reads found**: `SELECT * FROM cvers` [line 70778] (small system
    table, benign) and `SELECT * FROM (c_tabname)` with no WHERE [lines 73201-73202]
    - the persistence "list" method, flagged as BUG-001.

    - **PACKAGE SIZE**: zero occurrences in the whole program (grep) - no chunked
    DB reads anywhere.


    ### COMMIT/ROLLBACK map [VERIFIED: CL-012]

    | Statement | Count | Sample locations |

    |---|---|---|

    | COMMIT WORK | 10 | 40797, 40838, 41231, 41344, 41430, 54643, 55034, 72963, 76580,
    89322 |

    | COMMIT WORK AND WAIT | 20 | 40806, 40847, 41311, 41546, 41568, 49353, 50007,
    50656, 51024, 51861, 52139, 55121, 55130, 61823, 61896, 69783, 69827, 72592, 73434,
    131657 |

    | ROLLBACK WORK | 1 | 65618 |


    Total COMMIT statements: 30 (10 COMMIT WORK + 20 COMMIT WORK AND WAIT). One ROLLBACK
    WORK found at line 65618. The spot-checked context (repo create, lines 40791-40806)
    shows deliberate transaction boundaries: COMMIT WORK after a compensating delete
    in the CATCH branch, COMMIT WORK AND WAIT after successful repo creation - a legitimate
    pattern, not COMMIT-in-loop.


    ### Recommendations

    1. Fix BUG-001: restrict or paginate the unfiltered persistence-table read (METHOD
    list, line 73201)

    2. Audit the remaining SELECT * statements for column pruning (full-column reads
    inflate memory even with WHERE)

    3. Consider PACKAGE SIZE for reads on potentially large tables (none present today)

    '
  error_handling: '### Exception handling patterns

    - **TRY-CATCH at top level**: FORM run catches zcx_abapgit_exception and zcx_abapgit_not_found,
    displays both as MESSAGE TYPE ''E'' [VERIFIED: CL-013]

    - **Authorization check**: raises exception if user lacks startup authorization;
    hard stop, no fallback [VERIFIED: CL-014]

    - **Back-navigation**: FORM exit catches zcx_abapgit_exception and displays it
    as MESSAGE TYPE ''S'' DISPLAY LIKE ''E'' (non-blocking status message styled as
    error) [VERIFIED: CL-009]

    - **Deliberate error suppression**: FORM adjust_toolbar ignores all RPY_DYNPRO_READ
    errors and RPY_DYNPRO_INSERT errors except subrc 2/0 ("Ignore errors, just exit")
    [VERIFIED: CL-010]


    ### Anomalies

    - **BUG-002**: emergency mode via hardcoded Parameter ID ''DBT'' has no logging
    or audit trail [VERIFIED: CL-015]

    - ROLLBACK WORK found at line 65618; compensation patterns use explicit delete
    + COMMIT in CATCH branches (e.g. lines 40795-40798)

    '
  bug_candidates: '| ID | Severity | Type | Location | Lines | Description | Proposed
    fix | Status |

    |---|---|---|---|---|---|---|---|

    | BUG-001 | MINOR | PERFORMANCE | METHOD list (persistence) | 73201-73202 | SELECT
    * FROM (c_tabname) with no WHERE clause: full-table read on every list call; no
    PACKAGE SIZE in entire program [VERIFIED: CL-017] | Restrict/paginate; select
    needed columns only | to_verify |

    | BUG-002 | MINOR | SMELL | FORM open_gui | 152832-152838 | Hardcoded Parameter
    ID ''DBT'' + literal ''ZABAPGIT'' for emergency mode; no constants, no audit logging
    [VERIFIED: CL-015] | Extract constants; log emergency-mode activation | to_verify
    |


    ### Count by severity

    1. MINOR: 2


    ### Count by type

    1. PERFORMANCE: 1 (BUG-001)

    2. SMELL: 1 (BUG-002)

    '
  business_open_questions: '1. **Authorization model**: What SAP authorization objects
    back `zif_abapgit_auth=>c_authorization-startup`? Custom (Z*) or standard? [UNVERIFIABLE]

    2. **Emergency mode (''DBT''=''ZABAPGIT'')**: Under what circumstances does support
    use it? Is it documented internally? (relates to BUG-002) [UNVERIFIABLE]

    3. **Custom FM Z_ABAPGIT_SERIALIZE_PACKAGE** (line 42319): Is this FM installed
    on the target system, and who maintains it? [UNVERIFIABLE]

    4. **Git protocol**: Does the company use HTTPS + basic auth only (p_user, p_pass),
    or also token-based auth?

    5. **Persistence volume**: How large is the abapGit persistence table? (determines
    the real impact of BUG-001)

    6. **Background jobs**: Are scheduled abapGit background jobs (zcl_abapgit_background)
    active on this system?

    7. **Upgrade policy**: Who owns updating this standalone build (v1.1.13, merged
    2026-07-01) and at what cadence?

    8. **Scope of use**: Is this standalone build the production abapGit, or a developer-local
    convenience next to a developer-version install?

    '
  next_steps: '### Bug attack order

    1. **BUG-001** (PERFORMANCE): measure the persistence table size, then restrict/paginate
    METHOD list (lines 73201-73202)

    2. **BUG-002** (SMELL): extract ''DBT''/''ZABAPGIT'' constants and add audit logging
    in FORM open_gui (lines 152832-152838)


    ### Structural refactoring (medium-term)

    1. This is a generated single-file distribution (abapmerge 0.16.8): do NOT hand-refactor;
    upgrade by regenerating from upstream abapGit instead

    2. If the developer version can be installed, prefer it over the standalone build
    (real classes, transportable, testable)


    ### Required tests

    1. Smoke test: START-OF-SELECTION with authorized user → GUI opens on screen 1001

    2. Authorization test: unauthorized user → MESSAGE TYPE ''E'' ''No authorization
    to start abapGit''

    3. Batch test: sy-batch = abap_true → zcl_abapgit_background=>run() path

    4. Emergency-mode test: Parameter ID ''DBT'' = ''ZABAPGIT'' → database-utility
    action; ''HREF'' → debug mode

    '
