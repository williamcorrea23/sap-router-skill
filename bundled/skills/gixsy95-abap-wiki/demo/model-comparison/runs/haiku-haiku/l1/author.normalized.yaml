narrative_sections:
  executive_summary: '- **abapGit standalone distribution v1.1.13** - Git client for
    SAP ABAP development [VERIFIED: CL-001]

    - **Architecture**: Massive OO program with ~100+ deferred class/interface declarations
    (lines 29-235), local runtime classes, and FORM-based entry points [VERIFIED:
    CL-002]

    - **Main modes**: Interactive HTML GUI (online, default) and batch background
    processing (if sy-batch = abap_true) [VERIFIED: CL-003]

    - **Entry**: INITIALIZATION → toolbar adjustment + password dialog init; START-OF-SELECTION
    → FORM run → authorization check → FORM open_gui → GUI launch [VERIFIED: CL-004]

    - **Output**: no classic report output (no ALV/list/file at report level); the
    user-facing output is the HTML GUI rendered via zcl_abapgit_ui_factory [VERIFIED:
    CL-007]

    - **Bug candidates**: 2 MINOR (1 PERFORMANCE: unfiltered persistence SELECT; 1
    SMELL: hardcoded emergency-mode parameter)

    - **Test class**: none detected in the raw source from static patterns

    - **Version**: v1.1.13 (abapmerge 0.16.8, compiled 2026-07-01T10:45:14.302Z)

    '
  functional_scope: '## What it does

    abapGit is a Git version control integration for SAP ABAP systems. This standalone
    distribution is a monolithic executable PROG that bundles the entire abapGit codebase
    as deferred class definitions + local implementations, designed to run in environments
    where separate development packages cannot be installed. It provides a web-based
    GUI for clone, pull, push, merge, and diff operations on Git repositories within
    ABAP.


    ## Modes of operation

    1. **Interactive GUI (online)** [lines 152829-152844]: Launches HTML/web-based
    interface via `zcl_abapgit_ui_factory=>get_gui()->go_home()`. Supports emergency
    database tool mode (Parameter ID ''DBT''=''ZABAPGIT'' routes to database utility,
    ''HREF'' enables debug mode).

    2. **Batch background job** [lines 152827-152828]: When executed in batch (sy-batch
    = abap_true), delegates to `zcl_abapgit_background=>run()` for non-interactive
    Git operations.


    ## Output note

    The program produces no classic report output (no ALV, no spool list, no file
    at the report level): screen 1001 is an empty carrier selection screen [lines
    152376-152378] and all user-facing output is HTML rendered by the embedded GUI
    classes. For this reason there is no field-level output mapping at program level.


    ## Use cases

    1. Clone a Git repository into ABAP package structure via web GUI

    2. Pull upstream changes from remote Git branch

    3. Stage and commit ABAP objects as Git commits with diffs

    4. Merge conflicting branches via 3-way merge UI

    5. Display object-level diffs (ABAP source, data elements, structures)

    6. Run background jobs for scheduled push/pull operations

    7. Emergency database-utility access via Parameter ID ''DBT''

    '
  form_analysis: "### FORM run (lines 152802-152820) [VERIFIED: CL-005]\n**Purpose**:\
    \ Main orchestrator - authorization check, migration, and GUI dispatch.\n\n**Algorithm**:\n\
    1. Check user authorization via `zcl_abapgit_auth=>is_allowed(zif_abapgit_auth=>c_authorization-startup)`\
    \ [line 152808]\n2. If not authorized, raise exception 'No authorization to start\
    \ abapGit' [line 152809]\n3. Run stored migrations: `zcl_abapgit_migrations=>run()`\
    \ [line 152812]\n4. Open GUI via FORM open_gui [line 152813]\n5. Catch and display\
    \ exceptions (zcx_abapgit_exception, zcx_abapgit_not_found) as TYPE 'E' messages\
    \ [lines 152814-152817]\n\n**External dependencies**:\n- Class zcl_abapgit_auth\
    \ (authorization check)\n- Class zcl_abapgit_migrations (schema updates)\n- Exception\
    \ classes zcx_abapgit_exception, zcx_abapgit_not_found\n\n**Error handling**:\
    \ TRY-CATCH block with type-specific exception handling; messages displayed to\
    \ user [VERIFIED: CL-006]\n\n### FORM open_gui (lines 152822-152848) [VERIFIED:\
    \ CL-007]\n**Purpose**: Route execution to batch or interactive GUI.\n\n**Algorithm**:\n\
    1. Check sy-batch flag [line 152827]\n2. If batch: Call `zcl_abapgit_background=>run()`\
    \ and exit [line 152828]\n3. Otherwise (interactive):\n   a. GET PARAMETER ID\
    \ 'DBT' for emergency mode [line 152832]\n   b. CASE on DBT value: 'ZABAPGIT'\
    \ → database utility action, otherwise → home action [lines 152833-152838]\n \
    \  c. Set debug mode if DBT='HREF' [line 152840]\n   d. Prepare GUI: `lcl_startup=>prepare_gui_startup()`\
    \ [line 152842]\n   e. Get GUI factory: `zcl_abapgit_ui_factory=>get_gui()->go_home(lv_action)`\
    \ [line 152843]\n   f. Trigger screen 1001 via CALL SELECTION-SCREEN [line 152844]\n\
    \n**DB access**: None (SAP memory parameter only via GET PARAMETER ID)\n\n**External\
    \ dependencies**:\n- Class zcl_abapgit_background\n- Class zcl_abapgit_ui_factory\n\
    - Class zcl_abapgit_html (set_debug_mode)\n- Local class lcl_startup\n\n**Red\
    \ flags**:\n- BUG-002: hardcoded Parameter ID 'DBT' and literal 'ZABAPGIT' [lines\
    \ 152832-152838] - no constant, no audit logging of emergency mode\n\n### FORM\
    \ output (lines 152850-152877) [VERIFIED: CL-008]\n**Purpose**: Handle AT SELECTION-SCREEN\
    \ OUTPUT - hide Execute/Save buttons, set PF-STATUS.\n\n**Algorithm**:\n1. Call\
    \ set_pf_status from program rsdbrunt if available [line 152855]\n2. Append excluded\
    \ user-commands 'CRET' (Execute button) and 'SPOS' (Save) [lines 152857-152858]\n\
    3. CALL FUNCTION 'RS_SET_SELSCREEN_STATUS' to apply status excluding those commands\
    \ [line 152860]\n\n**External dependencies**: CALL FUNCTION 'RS_SET_SELSCREEN_STATUS',\
    \ PERFORM set_pf_status IN PROGRAM rsdbrunt\n\n### FORM exit (lines 152878-152902)\
    \ [VERIFIED: CL-009]\n**Purpose**: Handle SAP back/escape (EXIT-COMMAND) for the\
    \ main screen 1001 with graceful GUI navigation.\n\n**Algorithm**:\n1. Guard:\
    \ RETURN immediately if sy-dynnr <> 1001 (popup screens must not influence GUI\
    \ navigation) [lines 152885-152887]\n2. CASE sy-ucomm: on 'CBAC' or 'CCAN' (Back\
    \ & Escape) [line 152891]\n3. Call `zcl_abapgit_ui_factory=>get_gui( )->back(\
    \ iv_graceful = abap_true )`; if end of stack reached, `->free( )` for graceful\
    \ shutdown, else LEAVE TO SCREEN 1001 [lines 152892-152896]\n4. Catch zcx_abapgit_exception\
    \ into lx_error, display as MESSAGE TYPE 'S' DISPLAY LIKE 'E' [lines 152898-152899]\n\
    \n**External dependencies**: zcl_abapgit_ui_factory, zcx_abapgit_exception\n\n\
    ### FORM adjust_toolbar (lines 152904-152965) [VERIFIED: CL-010]\n**Purpose**:\
    \ Toggle the selection-screen toolbar: removed for the HTML screen, re-inserted\
    \ for variant maintenance (otherwise variant maintenance buttons are missing).\n\
    \n**Algorithm**:\n1. CALL FUNCTION 'RPY_DYNPRO_READ' to read the dynpro header/containers/flow\
    \ logic of sy-cprog screen (pv_dynnr = '1001') [lines 152912-152926]\n2. If read\
    \ fails (sy-subrc <> 0), RETURN silently [lines 152927-152929]\n3. Compute lv_no_toolbar\
    \ = NOT in variant maintenance, via `zcl_abapgit_factory=>get_environment( )->is_variant_maintenance(\
    \ )` [lines 152933-152934]\n4. If the header flag already matches, RETURN (no\
    \ change required) [lines 152936-152938]\n5. CALL FUNCTION 'RPY_DYNPRO_INSERT'\
    \ to rewrite the dynpro with the toggled no_toolbar flag [lines 152942-152960]\n\
    6. Ignore non-critical errors (sy-subrc 2 = already_exists, or 0) [lines 152961-152962]\n\
    \n**External dependencies**: RPY_DYNPRO_READ, RPY_DYNPRO_INSERT, zcl_abapgit_factory\n\
    \n**Red flags**: errors deliberately swallowed (\"Ignore errors, just exit\")\
    \ in both FM calls - acceptable for a cosmetic toolbar tweak but invisible to\
    \ support\n"
