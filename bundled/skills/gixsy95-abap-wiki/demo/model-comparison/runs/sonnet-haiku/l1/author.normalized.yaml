    local interfaces (implementable by the customer in a separate package). [VERIFIED:
    CL-018]


    ### 8.6 Message classes

    No static message class is used: every `MESSAGE ID ...` in the source passes a
    **variable** (`iv_msgid`, `sy-msgid`, `ls_msg-msgid`), never a literal message-class
    name, so no static `message-class` dependency can be extracted per the "no dynamic
