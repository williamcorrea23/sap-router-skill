    ### 8.3 Classes / Interfaces


    | Class/Interface | Package | Usage |

    |-------|---------|--------------|

    | `CL_HTTP_CLIENT` / `IF_HTTP_CLIENT` | standard | Git remote HTTP transport (`create_by_url`,
