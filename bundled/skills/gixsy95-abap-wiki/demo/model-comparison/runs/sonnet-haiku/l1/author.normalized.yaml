    '
  error_handling: '### COMMIT / ROLLBACK map

    30 `COMMIT WORK[ AND WAIT]` statements exist across the merged local classes;
    the two inspected in depth (lines 40797, 40838, inside `NEW_OFFLINE`/`NEW_ONLINE`
    of the repo-creation service) each fire once, inside a `TRY/CATCH` cleanup path,
    not inside a `LOOP`. [VERIFIED: CL-014] A full audit of all 30 sites was out of
    scope for this pass.


    ### Logging pattern

    The top-level FORMs (`run`, `output`, `exit`) all funnel failures through `zcx_abapgit_exception`
    / `zcx_abapgit_not_found`, caught and shown via `MESSAGE ... TYPE ''E''` or, for
    non-fatal UI issues in `output`/`exit`, `MESSAGE ... TYPE ''S'' DISPLAY LIKE ''E''`.
    [VERIFIED: CL-005] Deeper application-level logging (e.g. `ZIF_ABAPGIT_LOG`) exists
    inside the local class framework but was not traced end-to-end in this pass.


    ### Log anomalies

    None identified with confidence at the level actually read (top-level FORMs +
    the sampled deserialize/serialize methods). A full anomaly sweep across 516 local
