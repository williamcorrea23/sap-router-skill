bug_candidates:
- id: BUG-001
  severity: SMELL
  type: SMELL
  location: CLASS zcl_abapgit_objects_program, METHOD deserialize_cua, line 74699
  description: 'Direct write to the read-only-by-convention system field SY-TCODE
    (''SE41'') immediately before CALL FUNCTION ''RS_CUA_INTERNAL_WRITE'', self-labelled
    in the source as an ''evil hack, workaround to handle fixes in note 2159455''.
    Mutating SY-TCODE is a fragile technique: it can leak into other logic reading
    SY-TCODE later in the same call stack/LUW.'
  fix_proposed: Track the status of SAP Note 2159455 on the target NetWeaver release;
    if the underlying kernel/CUA check has been fixed upstream, drop the SY-TCODE
    assignment, or scope it with a save/restore pattern instead of a bare overwrite.
