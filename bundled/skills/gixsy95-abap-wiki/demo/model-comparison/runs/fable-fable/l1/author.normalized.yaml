bug_candidates:
- id: BUG-001
  severity: MINOR
  type: SMELL
  location: FORM adjust_toolbar, lines 152904-152965
  description: The program re-generates its OWN dynpro 1001 at runtime (RPY_DYNPRO_READ
    + RPY_DYNPRO_INSERT) at every INITIALIZATION when the no-toolbar flag differs
    from the desired state; every error path is deliberately swallowed with a bare
    RETURN (152927-152929, 152961-152963). Runtime modification of a repository object
    can fail or be forbidden in locked/production clients and leaves no trace when
    it fails.
  fix_proposed: 'Vendored upstream code: report upstream rather than patch locally.
    At minimum, log the swallowed sy-subrc branches (e.g. to a checkpoint group) so
    silent failures become diagnosable.'
- id: BUG-002
  severity: SMELL
  type: SMELL
  location: lcl_startup=>get_package_from_adt, lines 152761-152795
  description: 'The dynamic ADT integration wraps CREATE DATA / dynamic CALL METHOD
    in TRY ... CATCH cx_root ##NO_HANDLER and fails silently (''Let''s ignore it for
    now and fail silently''). Any unexpected error in the ADT context handshake is
    invisible.'
  fix_proposed: Catch the specific dynamic-invocation exceptions instead of cx_root
    and add a trace/log entry in the catch branch.
- id: BUG-003
  severity: MINOR
  type: SECURITY
  location: zcl_abapgit_background=>run, lines 151587-151603
  description: 'Background mode reads the background configuration from persistence
    (zcl_abapgit_persist_factory=>get_background( )->list( ), line 151587) and passes
    <ls_list>-username / <ls_list>-password as-is to zcl_abapgit_login_manager=>set_basic
    (151600-151603): git credentials for background jobs live in the abapGit persistence
    and transit in clear form inside the program.'
  fix_proposed: Prefer token-based auth for background repos and/or implement the
    ZCL_ABAPGIT_AUTH_EXIT authorization exit (hook include at line 152577) to control
    who may maintain/read background credentials.
- id: BUG-004
  severity: SMELL
  type: SMELL
  location: zcl_abapgit_persistence_db=>get_update_function / lock, lines 73190-73241
  description: 'To auto-release enqueue locks at COMMIT, the persistence layer calls
    an arbitrary standard function module as a dummy IN UPDATE TASK (73238-73239):
    ''CALL_V1_PING'' if it exists, otherwise ''BANK_OBJ_WORKL_RELEASE_LOCKS'' (73192-73194).
    Relying on unrelated standard FMs existing and staying side-effect-free is fragile
    across releases.'
  fix_proposed: Vendored upstream design; if hardening locally, generate a dedicated
    empty Z update-task FM and use it as the dummy.
- id: BUG-005
  severity: SMELL
  type: SECURITY
  location: Selection screen 1002 / lcl_password_dialog, lines 152393-152407 and 152448-152476
  description: 'Login credentials transit through program-global selection-screen
    PARAMETERS p_user / p_pass (p_pass TYPE c LENGTH 255, line 152402). Mitigations
    are present in the code: p_pass is cleared before display (152452), the password
    field is rendered invisible (152506-152508) and all three fields are cleared after
    the popup (152476), but the values remain global program state while the dialog
    is open (e.g. visible in the debugger).'
  fix_proposed: Accepted upstream trade-off of the selection-screen dialog; document
    as residual risk. Debugger access in production should be restricted anyway.
