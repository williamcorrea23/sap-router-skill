narrative_sections:
  executive_summary: '- ZABAPGIT_STANDALONE is the single-file distribution of **abapGit**,
    the community git client for ABAP: it serializes/deserializes repository objects
    and drives the whole workflow through an HTML-based GUI inside SAP GUI.

    - Architecture: one REPORT statement plus the complete abapGit framework (interfaces,
    classes, UI pages, object serializers) inlined into 152,996 lines by the abapmerge
    build tool [VERIFIED: CL-027]; the actual report layer is only 6 FORMs and 5 event
    blocks at the end of the file [VERIFIED: CL-011].

    - Bundled version: abapGit 1.133.0, merged by abapmerge 0.16.8 on 2026-07-01 [VERIFIED:
    CL-018].

    - Execution modes: interactive HTML GUI hosted on empty selection screen 1001
    [VERIFIED: CL-028]; background/batch processing when sy-batch = abap_true [VERIFIED:
    CL-002]; emergency database-utility mode via SPA/GPA parameter DBT = ''ZABAPGIT''
    [VERIFIED: CL-003].

    - Startup: authorization check, persistence migrations, then GUI [VERIFIED: CL-001].

    - Persistence lives in the custom table ZABAPGIT addressed via dynamic Open SQL
    [VERIFIED: CL-008]; git transport uses cl_http_client [VERIFIED: CL-009].

    - 4 optional user-exit includes (IF FOUND) allow local extensions without touching
    the vendored code [VERIFIED: CL-012].

    - Bug candidates: 2 MINOR, 3 SMELL = 5 total (all upstream design trade-offs,
    no local fix recommended).

    '
  functional_scope: "## What it does (business view)\nabapGit is the de-facto standard\
    \ git client for ABAP: it links SAP packages to git\nrepositories, serializes\
    \ development objects to files (and back), and lets developers\npull/push/branch\
    \ from an HTML UI rendered inside SAP GUI. This standalone report is the\nself-contained\
    \ installation variant: the whole framework is merged into one program so\nit\
    \ can be installed by copy-paste without the developer edition.\n\n## Modes\n\
    1. **Interactive (dialog)**: START-OF-SELECTION opens the HTML GUI on the home\
    \ page and\n   parks the session on the empty selection screen 1001 [VERIFIED:\
    \ CL-003] [VERIFIED: CL-028].\n2. **Background (batch)**: when run as a job (sy-batch\
    \ = abap_true) it executes the\n   configured background methods (e.g. automatic\
    \ pull/push) per repository\n   [VERIFIED: CL-002] [VERIFIED: CL-025], emitting\
    \ a classic list log [VERIFIED: CL-026].\n3. **Emergency DB-util mode**: with\
    \ SPA/GPA parameter DBT = 'ZABAPGIT' the GUI starts\n   directly on the database\
    \ utility page, to repair a broken persistence\n   [VERIFIED: CL-003].\n\n## Startup\
    \ sequence\nINITIALIZATION adjusts the dynpro-1001 toolbar and initializes the\
    \ login-dialog texts\n[VERIFIED: CL-021]; FORM run then checks the startup authorization,\
    \ runs migrations and\nopens the GUI [VERIFIED: CL-001]. lcl_startup additionally\
    \ resolves a repo to show from\nSPA/GPA parameters or from an ADT handshake (lines\
    \ 152659-152797).\n\n## UI technology\nThe UI is HTML rendered in cl_gui_html_viewer\
    \ hosted on screen 1001; OO ALV\n(cl_salv_table) is used for tabular popups [VERIFIED:\
    \ CL-030].\n"
  selection_screen: "The program has **no classic selection screen with user filters**.\
    \ It defines two screens:\n\n- **Screen 1001** (lines 152376-152378): empty dummy\
    \ screen whose only purpose is to host\n  the HTML control and keep the report\
    \ session alive [VERIFIED: CL-028]. FORM output\n  strips the Execute/Save buttons\
    \ and redirects focus to the HTML control\n  [VERIFIED: CL-004]; FORM exit maps\
    \ Back/Escape to the GUI page stack\n  [VERIFIED: CL-005].\n- **Screen 1002**\
    \ (lines 152389-152409): the git **login popup** (fields P_URL, P_USER,\n  P_PASS,\
    \ P_CMNT). It is displayed as a centered popup by lcl_password_dialog=>popup and\n\
    \  returns credentials only on confirm [VERIFIED: CL-007]. On output, P_URL and\
    \ P_CMNT are\n  display-only and P_PASS is invisible [VERIFIED: CL-029]. sscrfields-ucomm\
    \ is routed to\n  the dialog class only when dynpro 1002 is active [VERIFIED:\
    \ CL-022].\n\nNo PARAMETERS carries OBLIGATORY; there are no radiobuttons and\
    \ no select-options.\n"
  form_analysis: 'The report layer is deliberately thin: 6 FORMs + 5 event blocks
    [VERIFIED: CL-011]; all

    business logic lives in the merged class layer.


    ### password_popup (lines 152559-152573)

    Thin wrapper (##CALLED, invoked dynamically by the HTTP auth layer) delegating
    to

    lcl_password_dialog=>popup; returns user/password only on confirmation [VERIFIED:
    CL-007].


    ### lcl_startup (local class, lines 152598-152798)

    prepare_gui_startup: warns on SAPGUI for Java, optionally suppresses the last-shown
    repo,

    and resolves the repo to open from SPA/GPA repo key / package, or from the ADT
    context

    (dynamic access to CL_ADT_GUI_INTEGRATION_CONTEXT; silent catch - see BUG-002

    [VERIFIED: CL-014]).


    ### run (lines 152802-152820)

    Entry point from START-OF-SELECTION: authorization check, zcl_abapgit_migrations=>run,

    PERFORM open_gui; exceptions become MESSAGE TYPE ''E'' [VERIFIED: CL-001].


    ### open_gui (lines 152822-152848)

    Branches on sy-batch: background run [VERIFIED: CL-002] vs. HTML GUI with DBT
    emergency

    mode and CALL SELECTION-SCREEN 1001 [VERIFIED: CL-003].


    ### output (lines 152850-152876)

    PBO of screen 1001: standard PF-status via RSDBRUNT, excludes CRET/SPOS, sets
    focus on

    the GUI control except during variant maintenance [VERIFIED: CL-004].


    ### exit (lines 152878-152902)

    Exit-command handler restricted to dynpro 1001; graceful back-navigation over
    the GUI

    page stack, freeing the GUI at end of stack [VERIFIED: CL-005].


    ### adjust_toolbar (lines 152904-152965)

    Reads and re-inserts the program''s own dynpro to toggle the toolbar flag depending
    on

    variant-maintenance mode [VERIFIED: CL-006]; silent error handling - see BUG-001

    [VERIFIED: CL-013].

    '
  external_dependencies: "The merged framework touches a large number of standard\
    \ APIs across its ~150k lines; the\ndependency list of this analysis is a curated,\
    \ evidence-anchored selection of the\nload-bearing ones (report layer + persistence\
    \ + transport), not an exhaustive census of\nthe serializer layer.\n\n### Tables\n\
    | Table | Type | Usage |\n|---|---|---|\n| ZABAPGIT | DB (custom) | whole persistence\
    \ via dynamic DML on c_tabname [VERIFIED: CL-008] |\n| TADIR | DB (standard) |\
    \ object existence/author lookups in the serializer layer (e.g. line 94126) |\n\
    | TDEVC | DB (standard) | package attributes, e.g. software component dlvunit\
    \ (line 107411) |\n\n### Function modules\n| FM | Usage |\n|---|---|\n| RPY_DYNPRO_READ\
    \ / RPY_DYNPRO_INSERT | runtime toolbar adjustment of dynpro 1001 [VERIFIED: CL-006]\
    \ |\n| RS_SET_SELSCREEN_STATUS | exclude Execute/Save (1001) and PICK (1002) from\
    \ the PF status |\n| ENQUEUE_EZABAPGIT | persistence lock (custom lock object\
    \ shipped with abapGit) [VERIFIED: CL-020] |\n| CALL_V1_PING / BANK_OBJ_WORKL_RELEASE_LOCKS\
    \ | dummy update-task call releasing locks at commit [VERIFIED: CL-016] |\n\n\
    ### Classes\n| Class | Usage |\n|---|---|\n| CL_GUI_HTML_VIEWER (+ CL_GUI_CONTAINER)\
    \ | hosts the whole abapGit HTML UI |\n| CL_HTTP_CLIENT | git HTTP(S) transport\
    \ with proxy/SSL [VERIFIED: CL-009] |\n| CL_SALV_TABLE | OO ALV popups [VERIFIED:\
    \ CL-030] |\n| CL_HTTP_UTILITY | ADT context parameter parsing |\n\n### External\
    \ programs / user exits\n- PERFORM set_pf_status IN PROGRAM **rsdbrunt** IF FOUND\
    \ (line 152855); GUI status DETL\n  borrowed from **RSPFPAR** (line 152517).\n\
    - 4 optional INCLUDE ... IF FOUND user-exit hooks (authorizations, user exit,\
    \ background\n  exits, GUI pages) [VERIFIED: CL-012] - their existence in this\
    \ system is not\n  verifiable raw-only [UNVERIFIABLE].\n"
  performance: "### SELECT census (report layer)\nThe report-level coding (FORMs +\
    \ lcl_startup, lines 152559-152965) performs **no direct\nSELECT** [VERIFIED:\
    \ CL-010]; all DB access is encapsulated in the class layer, primarily\nthe ZABAPGIT\
    \ persistence (single-record reads by type/value, full-table list for the\nrepo\
    \ overview) [VERIFIED: CL-008].\n\n### Observations\n1. Background mode explicitly\
    \ releases repository caches after each processed repo\n   (refresh with iv_drop_cache\
    \ = abap_true) to bound memory in long job runs\n   [VERIFIED: CL-024].\n2. The\
    \ program's sheer size (152,996 lines [VERIFIED: CL-027]) makes generation/load\
    \ and\n   any editor-based handling heavy; this is inherent to the standalone\
    \ distribution, not\n   a defect.\n3. Serializer-layer DB access is object-driven\
    \ (keyed SELECT SINGLEs such as TADIR/TDEVC\n   lookups); no unbounded high-volume\
    \ table scans were observed in the reviewed regions.\n\n### Recommendations\n\
    No local optimization is appropriate: this is vendored upstream code; performance\
    \ topics\nshould be raised at https://github.com/abapGit/abapGit.\n"
  error_handling: "### Report layer\n- FORM run: TRY/CATCH around the whole startup;\
    \ zcx_abapgit_exception and\n  zcx_abapgit_not_found become MESSAGE TYPE 'E' (program\
    \ terminates cleanly)\n  [VERIFIED: CL-019].\n- FORM output / FORM exit: GUI errors\
    \ are surfaced non-destructively as\n  MESSAGE TYPE 'S' DISPLAY LIKE 'E' (lines\
    \ 152872, 152899).\n- Startup is guarded by an authorization hook: zcl_abapgit_auth=>is_allowed(\n\
    \  c_authorization-startup ) [VERIFIED: CL-019].\n\n### Locking (persistence)\n\
    Writes to ZABAPGIT acquire the EZABAPGIT enqueue and rely on a dummy FM call IN\
    \ UPDATE\nTASK to auto-release locks at COMMIT [VERIFIED: CL-020] - an unusual\
    \ but deliberate\nupstream pattern (BUG-004).\n\n### Anomalies\n- Silent error\
    \ swallowing in adjust_toolbar (BUG-001 [VERIFIED: CL-013]) and in the ADT\n \
    \ handshake (CATCH cx_root, BUG-002 [VERIFIED: CL-014]).\n- Background mode logs\
    \ per-repo exceptions into the abapGit log and writes them to the\n  list output\
    \ instead of aborting the job [VERIFIED: CL-026].\n"
  bug_candidates: '| ID | Severity | Type | Location | Lines | Description |

    |---|---|---|---|---|---|

    | BUG-001 | MINOR | SMELL | FORM adjust_toolbar | 152904-152965 | Runtime re-generation
    of own dynpro 1001 via RPY_DYNPRO_INSERT; all errors silently swallowed [VERIFIED:
    CL-013] |

    | BUG-002 | SMELL | SMELL | lcl_startup=>get_package_from_adt | 152761-152795
    | CATCH cx_root ##NO_HANDLER - ADT handshake fails silently [VERIFIED: CL-014]
    |

    | BUG-003 | MINOR | SECURITY | zcl_abapgit_background=>run | 151587-151603 | Background
    git credentials read from persistence and passed in clear to the login manager
    [VERIFIED: CL-015] |

    | BUG-004 | SMELL | SMELL | zcl_abapgit_persistence_db=>lock | 73190-73241 | Arbitrary
    standard FM called IN UPDATE TASK as dummy to release enqueue locks [VERIFIED:
    CL-016] |

    | BUG-005 | SMELL | SECURITY | screen 1002 / lcl_password_dialog | 152393-152476
    | Credentials transit through global selection-screen fields; mitigated by invisible
    field + CLEARs [VERIFIED: CL-017] |


    ### Count by severity

    - BLOCKER: 0

    - MAJOR: 0

    - MINOR: 2

    - SMELL: 3

    - DEAD_CODE: 0


    ### Count by type

    - SMELL: 3

    - SECURITY: 2


    All five findings are upstream design decisions of the abapGit project shipped
    verbatim

    in the standalone build; the correct remediation channel is upstream, not a local
    patch.

    '
  test_coverage: 'No test class exists in the file: ''FOR TESTING'' has zero occurrences
    [VERIFIED: CL-023].

    This is expected - abapmerge strips unit tests when producing the standalone build;
    the

    upstream repository carries the full test suite. Proposal: none locally (vendored
    code);

    do not add local test classes to a generated file that is overwritten at every
    upgrade.

    '
  business_open_questions: "1. Is this exactly the unmodified upstream abapGit 1.133.0\
    \ build, or does it carry local\n   patches? (diff against the official zabapgit_standalone\
    \ release; raw-only cannot\n   verify) [UNVERIFIABLE]\n2. Do any of the four user-exit\
    \ includes (zabapgit_authorizations_exit, zabapgit_user_exit,\n   zabapgit_background_user_exit,\
    \ zabapgit_gui_pages_userexit) exist in this system, and\n   what do they enforce?\
    \ (requires MCP where-used) [UNVERIFIABLE]\n3. Is background mode (BUG-003) actually\
    \ scheduled as a job in <SAP_DEV_SYSTEM>, and are git\n   credentials stored in\
    \ the ZABAPGIT persistence for it? [UNVERIFIABLE]\n4. Who is allowed to start\
    \ abapGit (authorization exit behind\n   zif_abapgit_auth=>c_authorization-startup,\
    \ line 152808)? Is an auth exit implemented?\n5. What is the upgrade policy for\
    \ this program (who re-imports new releases, how often)?\n6. Is a transaction\
    \ code bound to ZABAPGIT_STANDALONE? (requires MCP/TSTC lookup)\n   [UNVERIFIABLE]\n"
  next_steps: "### Bug attack order\n1. BUG-003 (MINOR/SECURITY): verify whether background\
    \ jobs with stored credentials are\n   configured; prefer tokens and restrict\
    \ access to the DB-util page.\n2. BUG-001 (MINOR): confirm dynpro re-generation\
    \ works in the production client policy\n   (client/system change options); otherwise\
    \ the toolbar toggle silently no-ops.\n3. BUG-002/004/005 (SMELL): document as\
    \ accepted upstream trade-offs.\n\n### Structural refactoring\nNone locally -\
    \ vendored single-file distribution regenerated by abapmerge at every\nupgrade;\
    \ any change would be lost and belongs upstream (github.com/abapGit/abapGit).\n\
    \n### Required tests\nNone locally (see test_coverage).\n\n### Wiki follow-ups\n\
    - Check with MCP whether the user-exit includes and a launcher transaction exist\
    \ and link\n  them from this page.\n- Record the installed version (1.133.0) and\
    \ compare on the next re-ingest to track\n  upgrades.\n"
