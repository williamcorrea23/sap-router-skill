bug_candidates:
  - id: BUG-001
    severity: MINOR
    type: PERFORMANCE
    location: "package/repo bulk-delete path, LOOP AT lt_tadir ASSIGNING <ls_tadir> (around line 76560-76580)"
    description: "COMMIT WORK. executes once per deleted object inside LOOP AT lt_tadir, i.e. one implicit database commit per object for a package delete-all-objects run. The inline comment ('make sure to save object deletions') shows this is a deliberate per-object durability choice, not an oversight, but it still means (a) commit overhead scales linearly with package size and (b) a mid-loop failure leaves the deletion partially applied with no way to roll back the objects already committed."
    fix_proposed: "Batch the commits (e.g. every N objects) instead of once per object, or make the partial-completion behaviour explicit to the caller/log so a resumed/aborted bulk delete is diagnosable."
  - id: BUG-002
    severity: SMELL
    type: SMELL
    location: "abapmerge collision-resolution renames, 65 occurrences across the file, e.g. line 61693-61695 (kHGwlHbtMQYaNXTWgQdwmgPrpXDFKn, originally zcl_abapgit_gui_page_flow::lcl_filter)"
    description: "The abapmerge build tool renames originally-local helper classes that collide by name (e.g. multiple unrelated 'lcl_filter'/'lcl_helper' classes from different source files) to random hash-like global identifiers when flattening ~470 previously-separate global classes into this one file. Functionally harmless (each rename is 1:1 and internally consistent), but it makes the merged standalone build much harder to read/debug/grep than the original multi-file abapGit repository."
    fix_proposed: "Not actionable in the generated file itself (it is machine-generated); if a fork of this build is maintained, work against the original abapGit repository (github.com/abapGit/abapGit) and regenerate via abapmerge rather than hand-editing the standalone artifact."

