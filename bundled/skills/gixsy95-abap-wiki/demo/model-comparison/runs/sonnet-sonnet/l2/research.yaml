slice: abapgit-standalone-demo

gaps:
  - local_id: g1
    class: PURPOSE
    load_bearing: true
    entities: [program-ZABAPGIT_STANDALONE]
    description: >-
      Is ZABAPGIT_STANDALONE still the intended/primary way abapGit is run at
      ACME today, or was it only ever the bootstrap installer for a full
      multi-object abapGit repository (reached via a separate transaction
      ZABAPGIT) that has since superseded it?
    hypothesis: >-
      By design [VERIFIED:
      slices/abapgit-standalone-demo/research/2026-07-03-standalone-vs-developer-version.md:57-65],
      the standalone build is the documented bootstrap installer for a
      separate "developer version" reached via transaction ZABAPGIT. This
      workspace's TADIR export for devclass ZABAPGIT lists only
      ZABAPGIT_STANDALONE, with no transaction or repository objects
      suggesting a completed developer-version install
      [VERIFIED: slices/abapgit-standalone-demo/research/2026-07-03-no-customer-exits-implemented.md:23-29],
      which is circumstantially consistent with ACME still being at the
      bootstrap-only stage -- but the TADIR export is scoped to a single
      devclass (a developer-version install could live in a different, e.g.
      local $, package) and cannot rule that out [UNVERIFIABLE]. Confirmation
      from the owner is required.
    confidence: medium
    status: open

  - local_id: g2
    class: TRIGGER
    load_bearing: true
    entities: [program-ZABAPGIT_STANDALONE]
    description: >-
      How is ZABAPGIT_STANDALONE actually launched at ACME -- direct SE38
      execution (the documented mechanism for this artifact type), a
      dedicated custom transaction code, or SUBMIT from another Z program?
    hypothesis: >-
      [VERIFIED:
      slices/abapgit-standalone-demo/research/2026-07-03-standalone-vs-developer-version.md:21-35]
      The official abapGit documentation states plainly that the standalone
      build "is executed via transaction SE38" and that its install procedure
      does not create any dedicated custom transaction code. This workspace's
      raw TADIR export for devclass ZABAPGIT registers only the PROG object
      ZABAPGIT_STANDALONE, with no TRAN/TSTC entry, consistent with direct
      SE38 execution rather than a bespoke transaction wrapper.
    confidence: high
    status: auto-answered
    resolution:
      evidence: e1
      note: >-
        raw-docs 02-install-standalone.md states the standalone build is run
        directly via transaction SE38 (documented, standard mechanism); the
        TADIR export shows no separate transaction-code object for it either,
        which is consistent with this being the actual ACME launch path.
        Whether a site-specific transaction wrapper was added on top is not
        ruled out but is not evidenced anywhere in this workspace.

  - local_id: g3
    class: ACTOR
    load_bearing: true
    entities: [program-ZABAPGIT_STANDALONE, program-ZABAPGIT_AUTHORIZATIONS_EXIT]
    description: >-
      Who is authorized to start ZABAPGIT_STANDALONE in production at
      ACME -- is the built-in zcl_abapgit_auth=>is_allowed(...-startup)
      check configured restrictively in the authorization concept, given
      that no custom zabapgit_authorizations_exit overlay exists?
    hypothesis: >-
      [VERIFIED:
      slices/abapgit-standalone-demo/research/2026-07-03-no-customer-exits-implemented.md:74-78]
      No zabapgit_authorizations_exit customer-exit include is implemented
      (see g4), so startup authorization is governed exclusively by the
      standard SAP authorization object/concept behind
      zcl_abapgit_auth=>is_allowed, with no ACME-specific code overlay.
      Whether that standard authorization object is itself assigned narrowly
      (e.g. only to Basis/developers) or broadly in the ACME roles
      concept is a security-customizing fact that is not observable from
      source code, from generic abapGit documentation, or from any raw
      export in this workspace [UNVERIFIABLE] -- requires a person (security/
      Basis owner).
    confidence: low
    status: open

  - local_id: g4
    class: INTEGRATION
    load_bearing: true
    entities:
      - program-ZABAPGIT_STANDALONE
      - program-ZABAPGIT_AUTHORIZATIONS_EXIT
      - program-ZABAPGIT_USER_EXIT
      - program-ZABAPGIT_BACKGROUND_USER_EXIT
      - program-ZABAPGIT_GUI_PAGES_USEREXIT
    description: >-
      Has ACME implemented any of the four optional customer-exit
      includes (zabapgit_authorizations_exit, zabapgit_user_exit,
      zabapgit_background_user_exit, zabapgit_gui_pages_userexit) that the
      vendored code reserves as IF FOUND extension points? This is
      load-bearing because it determines whether ANY ACME-specific
      business logic is layered on top of the pure vendored abapGit
      behaviour, or whether the whole object runs 100% stock open-source
      logic.
    hypothesis: >-
      [VERIFIED:
      slices/abapgit-standalone-demo/research/2026-07-03-no-customer-exits-implemented.md:20-73]
      None of the four are implemented. Four independent, mutually
      corroborating checks agree: the raw TADIR export for devclass ZABAPGIT
      lists exactly one object (ZABAPGIT_STANDALONE); the package index
      wiki/_packages/ZABAPGIT.md reports "1 of 1" documented objects; all
      four exit-program wikilink targets materialized as dependency-derived
      L0 stubs with devclass='' and raw_source_status=missing (i.e. never
      found in any raw system extract, only referenced by the INCLUDE
      statement); and a whole-raw/ text search finds the four names nowhere
      except as literal INCLUDE targets inside ZABAPGIT_STANDALONE.prog.abap
      itself. Caveat: the TADIR export is scoped to devclass ZABAPGIT, so a
      different-package implementation cannot be strictly excluded, though it
      is very unlikely given customer-exit INCLUDEs are conventionally
      same-package companions.
    confidence: high
    status: auto-answered
    resolution:
      evidence: e2
      note: >-
        TADIR export (1 object only), package index ("1 of 1" documented),
        and all four exit-program L0 stubs (devclass='', raw_source_status:
        missing, tag dependency-derived) jointly show none of the four
        customer exits exist as real objects in this system snapshot.

  - local_id: g5
    class: TRIGGER
    load_bearing: true
    entities: [program-ZABAPGIT_STANDALONE]
    description: >-
      Is any background/batch job configured today for
      zcl_abapgit_background=>run -- i.e. does any repository auto-sync
      unattended, and if so which repositories and on what schedule?
    hypothesis: >-
      Per the L1 page's own note, the background job list is persisted in a
      database table, not in source, so it cannot be derived from the merged
      ABAP source. None of the four raw-docs pages fetched for this research
      document ACME's specific job configuration (they only describe the
      generic install/usage flows). Answering this would normally require an
      MCP execute_data_query against the background-job persistence table (or
      TBTCO/TBTCP for the wrapping batch job), which is unavailable in this
      research pass [UNVERIFIABLE] -- stays open for the owner.
    confidence: low
    status: open

  - local_id: g6
    class: BUSINESS-RULE
    load_bearing: true
    entities: [program-ZABAPGIT_STANDALONE]
    description: >-
      For BUG-001 (COMMIT WORK executed once per deleted object inside LOOP
      AT lt_tadir during a package/repo bulk delete): is the per-object-commit
      behaviour a deliberate choice to preserve partial progress if a bulk
      delete fails partway through, or should it be batched/made
      transactional?
    hypothesis: >-
      [INFERRED] Per-object commits inside a destructive bulk-delete loop are
      a common deliberate pattern in transactional systems specifically to
      preserve already-completed deletions if the loop is interrupted (dump,
      timeout, lock conflict), rather than losing all progress in a single
      rollback. This is a plausible general software-engineering rationale
      for the PATTERN, not proof of the abapGit authors' actual intent for
      this specific loop -- no raw-docs source in this workspace documents
      the delete-all-objects design rationale, so this load-bearing gap
      cannot be closed from an inference and stays open.
    confidence: low
    status: open

  - local_id: g7
    class: CONFIG
    load_bearing: true
    entities: [program-ZABAPGIT_STANDALONE]
    description: >-
      Why was ZABAPGIT_STANDALONE registered under the transportable
      Z-namespace package ZABAPGIT instead of the officially recommended
      local, non-transportable $ package (e.g. $ABAPGIT) -- a deliberate
      governance decision (e.g. to transport the tool consistently across the
      landscape) or an unreviewed deviation from documented best practice?
    hypothesis: >-
      [ANOMALY, VERIFIED:
      slices/abapgit-standalone-demo/research/2026-07-03-package-deviation-from-recommended-practice.md:9-29]
      The official abapGit documentation explicitly recommends "use a local $
      package (e.g. $ABAPGIT)" for the standalone install. This workspace's
      L1 frontmatter and raw TADIR export both confirm the actual package is
      devclass ZABAPGIT (namespace Z, custom, transportable) -- a direct,
      fully verified deviation from the documented recommendation. The
      underlying fact of the deviation is closed; the WHY (deliberate
      landscape-transport decision vs. unreviewed default) is a governance
      judgment call only the owner/Basis team can make, so the gap itself
      stays open.
    confidence: medium
    status: open

  - local_id: g8
    class: FIELD-SEMANTICS
    load_bearing: false
    entities:
      - program-ZABAPGIT_STANDALONE
      - function-module-ENQUEUE_EZABAPGIT
      - function-module-DEQUEUE_EZABAPGIT
    description: >-
      Is the EZABAPGIT lock object (and its auto-generated
      ENQUEUE_EZABAPGIT/DEQUEUE_EZABAPGIT function modules) a standard
      artifact created as part of any normal abapGit install, or a
      ACME-specific customization?
    hypothesis: >-
      [INFERRED:
      slices/abapgit-standalone-demo/research/2026-07-03-ezabapgit-lock-object-standard-knowledge.md:14-29]
      ENQUEUE_/DEQUEUE_ function-module pairs are always mechanically
      auto-generated 1:1 from an SE11 lock object name -- naming a tool's
      single-instance guard lock object after itself (EZABAPGIT, matching
      ZABAPGIT_STANDALONE/ZABAPGIT) is universal SAP development convention,
      not evidence of ACME customization. Non-load-bearing because it
      does not change how the guard's behaviour (already established from
      the code itself) is understood -- only its provenance/attribution.
    confidence: high
    status: auto-answered
    resolution:
      evidence: e5
      note: >-
        Standard SAP SE11 lock-object-to-FM generation convention; naming a
        tool's guard lock after itself is universal practice, not
        ACME-specific. [INFERRED, sap-standard] -- closes only because
        non-load-bearing.

  - local_id: g9
    class: INTEGRATION
    load_bearing: false
    entities: [program-ZABAPGIT_STANDALONE]
    description: >-
      Does ACME actually use abapGit in online mode (git-remote via HTTP,
      matching the dynpro 1002 login popup and the IF_HTTP_CLIENT
      dependency) or offline mode (ZIP import/export, recommended for
      air-gapped/SSL-restricted environments), or both?
    hypothesis: >-
      [VERIFIED:
      slices/abapgit-standalone-demo/research/2026-07-03-online-vs-offline-modes.md:9-26]
      Both mechanisms are core, always-present capabilities of the vendored
      abapGit codebase (HTTP-client-based online path via IF_HTTP_CLIENT, and
      ZIP-based offline path via CL_ABAP_ZIP) -- their presence in the code
      does not indicate which mode ACME's actual, currently-configured
      repositories use. That is a live-system configuration fact
      [UNVERIFIABLE] from any source available in this research pass.
    confidence: low
    status: open

  - local_id: g10
    class: DATA-LIFECYCLE
    load_bearing: false
    entities: [program-ZABAPGIT_STANDALONE]
    description: >-
      What is the retention/lifecycle of the git credentials entered via the
      P_USER/P_PASS login popup (dynpro 1002) -- are they persisted anywhere,
      or used transiently for the HTTP session only?
    hypothesis: >-
      [INFERRED:
      slices/abapgit-standalone-demo/research/2026-07-03-credential-lifecycle-standard-knowledge.md:14-22]
      abapGit's well-known design does not maintain its own credential vault:
      values entered on the login popup authenticate the current outbound
      HTTP(S) session only and are not written to a Z-table by the vendored
      code. Consistent with (though not proven solely by) the absence of any
      credential-persistence table in the L1 page's table dependency list.
      Non-load-bearing: does not change understanding of the program's own
      flow, which the L1 page already documents independently.
    confidence: medium
    status: auto-answered
    resolution:
      evidence: e6
      note: >-
        Standard abapGit credential-handling design: no built-in server-side
        credential store; no persistence table found in the L1 dependency
        list either. [INFERRED, sap-standard] -- closes only because
        non-load-bearing.

  - local_id: g11
    class: BUSINESS-RULE
    load_bearing: true
    entities: [program-ZABAPGIT_STANDALONE]
    description: >-
      What does the "emergency DB-utility" mode (SPA/GPA memory parameter
      DBT = 'ZABAPGIT', branched on in FORM open_gui) actually expose, and
      who is expected to use it?
    hypothesis: >-
      No source consulted in this research pass documents this hidden mode --
      none of the four fetched raw-docs pages mention an "emergency
      DB-utility" mode or a DBT SPA/GPA parameter, and tracing the specific
      branch inside the ~470 embedded classes was out of scope for the L1
      pass. Given the security-sensitive nature of an undocumented
      "emergency" mode gated only by a manually-set memory parameter, no
      speculative [INFERRED] explanation is offered here -- stays fully open
      for the owner/developer expert.
    confidence: low
    status: open

  - local_id: g12
    class: ACTOR
    load_bearing: false
    entities: [program-ZABAPGIT_STANDALONE]
    description: >-
      Do ACME developers/administrators primarily launch and use abapGit
      through classic SAPGUI (matching the documented SE38 mechanism), or
      through ADT/Eclipse (lcl_startup=>get_package_from_adt)?
    hypothesis: >-
      [VERIFIED:
      slices/abapgit-standalone-demo/research/2026-07-03-standalone-vs-developer-version.md:43-55]
      Official documentation lists "Works best with SAP GUI for Windows" as a
      prerequisite and documents SE38 as the launch mechanism -- SAPGUI is
      the documented, primary client. The code additionally supports an
      optional ADT-context entry point (get_package_from_adt) without
      displacing SAPGUI as the documented default; which one ACME
      developers use day-to-day in practice is not separately evidenced.
    confidence: medium
    status: auto-answered
    resolution:
      evidence: e1
      note: >-
        raw-docs 02-install-standalone.md: "Works best with SAP GUI for
        Windows"; SE38 is the documented launch path. ADT integration exists
        in the code as an optional, not primary, entry point.

