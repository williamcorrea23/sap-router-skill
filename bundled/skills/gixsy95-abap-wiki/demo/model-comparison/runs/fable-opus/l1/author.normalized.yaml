narrative_sections:
  executive_summary: "- Standalone single-file distribution of **abapGit**, the open-source\
    \ git client\n  for ABAP, version **1.133.0**, produced by abapmerge 0.16.8 on\
    \ 2026-07-01\n  [VERIFIED: CL-001]. MIT-licensed by the abapGit contributors (abapgit.org)\n\
    \  [VERIFIED: CL-025].\n- Architecture: one merged report of 152,996 lines [VERIFIED:\
    \ CL-026] containing\n  the entire abapGit class/interface library (persistence,\
    \ git protocol,\n  object serializers, HTML GUI framework) plus a thin report\
    \ shell of 6 FORMs\n  [VERIFIED: CL-014] and two local classes (lcl_password_dialog,\
    \ lcl_startup).\n- Execution modes: interactive HTML GUI hosted in cl_gui_html_viewer\
    \ on dummy\n  selection screen 1001; background mode via sy-batch -> zcl_abapgit_background\n\
    \  [VERIFIED: CL-003]; emergency DB-utility mode via SPA/GPA parameter 'DBT' =\n\
    \  'ZABAPGIT' [VERIFIED: CL-004].\n- Persistence: everything is stored in DB table\
    \ ZABAPGIT, accessed only through\n  dynamic SQL on the constant c_tabname [VERIFIED:\
    \ CL-006]; the table is even\n  auto-created by the migration on first run [VERIFIED:\
    \ CL-018].\n- Extensibility: 4 optional user-exit includes (auth, user exit, background,\n\
    \  GUI pages) integrated with INCLUDE ... IF FOUND [VERIFIED: CL-015].\n- No test\
    \ classes merged (stripped by abapmerge) [VERIFIED: CL-022].\n- Bug candidates:\
    \ 0 BLOCKER, 0 MAJOR, 3 MINOR/SMELL performance-and-robustness\n  findings + 2\
    \ SMELL (catch-all, password field) = 5, all upstream design\n  decisions rather\
    \ than local defects.\n"
  functional_scope: "## What it does (business view)\nThis is the abapGit client itself:\
    \ it lets developers link ABAP packages to git\nrepositories (online or offline),\
    \ serialize/deserialize repository objects,\nstage/commit/push/pull over HTTP(S)\
    \ and administer its own persistence via a\nbuilt-in database utility. It is the\
    \ standalone (copy-paste) distribution: the\nwhole abapGit library is merged into\
    \ one report [VERIFIED: CL-001].\n\n## Modes\n- **Interactive HTML GUI** (default):\
    \ FORM run -> authorization check ->\n  migrations -> open_gui -> zcl_abapgit_ui_factory\
    \ GUI on screen 1001\n  [VERIFIED: CL-002].\n- **Background** (`sy-batch = abap_true`):\
    \ delegates to\n  zcl_abapgit_background=>run for scheduled pull/push jobs [VERIFIED:\
    \ CL-003]\n  [VERIFIED: CL-023].\n- **Emergency DB mode**: SPA/GPA parameter 'DBT'\
    \ = 'ZABAPGIT' opens the database\n  utility page directly (documented recovery\
    \ mode) [VERIFIED: CL-004].\n\n## Use cases\n1. Install/serialize a git repository\
    \ into an ABAP package (pull/clone).\n2. Push local ABAP changes to a remote repository\
    \ (stage + commit).\n3. Export/import a repository as ZIP file without connectivity.\n\
    4. Scheduled background synchronization of repositories.\n5. Emergency repair\
    \ of abapGit's own persistence (DB utility).\n\n## Extension points\nFour INCLUDE\
    \ ... IF FOUND hooks allow customer exits without modifying the\nreport: zabapgit_authorizations_exit\
    \ (ZIF_ABAPGIT_AUTH), zabapgit_user_exit\n(ZIF_ABAPGIT_EXIT), zabapgit_background_user_exit\
    \ (ZIF_ABAPGIT_BACKGROUND),\nzabapgit_gui_pages_userexit [VERIFIED: CL-015]. Startup\
    \ can also be steered by\nSPA/GPA parameters or the ADT GUI integration context\
    \ [VERIFIED: CL-005].\n"
  selection_screen: "The program has no classic selection screen with user parameters\
    \ at report level.\n- **Screen 1001** - empty dummy selection screen used purely\
    \ as container for the\n  HTML viewer; started with CALL SELECTION-SCREEN 1001\
    \ after the GUI is built\n  [VERIFIED: CL-021]. FORM output strips the Execute/Save\
    \ buttons via\n  RS_SET_SELSCREEN_STATUS and borrows PF-status logic from RSDBRUNT.\n\
    - **Screen 1002** - login popup (title, P_URL, P_USER, P_PASS, P_CMNT) owned by\n\
    \  lcl_password_dialog. P_URL and P_CMNT are display-only (screen-input = '0');\n\
    \  P_PASS is made invisible at PBO; on 'OK' the credentials flow back to the\n\
    \  caller via the CHANGING parameters of popup( ) [VERIFIED: CL-013].\n- **Event\
    \ dispatch** - AT SELECTION-SCREEN OUTPUT / AT SELECTION-SCREEN /\n  ON EXIT-COMMAND\
    \ route by sy-dynnr: 1002 events go to lcl_password_dialog, the\n  exit handling\
    \ applies only to 1001 [VERIFIED: CL-019].\n"
  form_analysis: '### run (lines 152802-152820)

    Entry FORM from START-OF-SELECTION [VERIFIED: CL-002]. Checks startup

    authorization (zcl_abapgit_auth=>is_allowed), runs data migrations

    (zcl_abapgit_migrations=>run), performs open_gui; catches

    zcx_abapgit_exception / zcx_abapgit_not_found into MESSAGE TYPE ''E''.


    ### open_gui (lines 152822-152848)

    Branches on sy-batch: background run vs GUI startup [VERIFIED: CL-003]. Reads

    GET PARAMETER ID ''DBT'' for emergency mode, sets HTML debug mode when ''HREF'',

    prepares startup repo (lcl_startup), calls get_gui( )->go_home( ) and finally

    CALL SELECTION-SCREEN 1001 to keep the container alive [VERIFIED: CL-004].


    ### output (lines 152850-152876) / exit (lines 152878-152902)

    PBO/exit handling of the container screen: excludes CRET/SPOS ucomms via

    RS_SET_SELSCREEN_STATUS, sets GUI focus (errors degraded to MESSAGE ''S''

    DISPLAY LIKE ''E'' [VERIFIED: CL-020]); exit routes Back/Escape through the GUI

    page stack and only leaves when the stack is empty [VERIFIED: CL-019].


    ### adjust_toolbar (lines 152904-152965)

    Reads dynpro 1001 with RPY_DYNPRO_READ and, when the no_toolbar flag differs

    from the wanted state, rewrites the dynpro with RPY_DYNPRO_INSERT - a runtime

    self-modification executed from INITIALIZATION; all errors silently ignored

    [VERIFIED: CL-011] (BUG-003).


    ### password_popup (lines 152559-152573) + lcl_password_dialog (152414-152558)

    Thin FORM wrapper (called dynamically by the HTTP auth layer, ##CALLED) around

    the screen-1002 login dialog; credentials returned only on ''OK''

    [VERIFIED: CL-013].


    ### lcl_startup (lines 152598-152798)

    prepare_gui_startup: SAPGUI-for-Java warning, default-repo suppression, then

    startup repo resolution from SPA/GPA repo key / package / ADT context

    [VERIFIED: CL-005]; get_package_from_adt uses dynamic access to

    CL_ADT_GUI_INTEGRATION_CONTEXT with a catch-all (BUG-004) [VERIFIED: CL-012].


    ### zcl_abapgit_persistence_db (implementation lines 73157-73288)

    Central persistence wrapper over table ZABAPGIT via dynamic (c_tabname)

    [VERIFIED: CL-006]; 4 SELECTs + 1 INSERT/DELETE/MODIFY/UPDATE each

    [VERIFIED: CL-014] [VERIFIED: CL-008]; every write is guarded by

    ENQUEUE_EZABAPGIT plus the dummy update-task trick [VERIFIED: CL-007]

    (BUG-002).

    '
  external_dependencies: 'The merged library is self-contained: all zcl_/zif_abapgit_*
    classes and

    interfaces are local to this report. External dependencies are SAP standard

    APIs plus the own persistence table.


    ### Tables

    | Table | Type | Usage |

    |---|---|---|

    | ZABAPGIT | DB (custom) | Full persistence (repos, settings, checksums) via dynamic
    (c_tabname) [VERIFIED: CL-006]; auto-created on first run [VERIFIED: CL-018] |

    | TADIR | DB | Object directory reads (SICF mapping, object existence, package
    content) [VERIFIED: CL-024] |

    | TDEVC | DB | Package attributes (dlvunit, mainpack) |

    | REPOSRC | DB | Last-changed user/date of report sources |

    | E070 | DB | Transport request owner |

    | DD02L | DB | Table existence checks (incl. own persistence table) |

    | T100 (+T100O/T/U/X) | DB | MSAG deserializer deletes/rewrites message texts
    natively [VERIFIED: CL-017] |

    | CVERS | DB | Installed software components |

    | TSTC | DB | Transaction existence checks |


    ### Function modules (representative)

    | FM | Usage |

    |---|---|

    | ENQUEUE_EZABAPGIT | Lock before persistence writes [VERIFIED: CL-007] |

    | CALL_V1_PING / BANK_OBJ_WORKL_RELEASE_LOCKS | Dummy update-task FM (dynamic,
    literal fallback) - BUG-002 |

    | RS_SET_SELSCREEN_STATUS | Toolbar stripping on screens 1001/1002 |

    | RPY_DYNPRO_READ / RPY_DYNPRO_INSERT | Runtime rewrite of dynpro 1001 - BUG-003
    |

    | DDIF_TABL_PUT / DDIF_TABL_ACTIVATE | Runtime creation of the ZABAPGIT table
    [VERIFIED: CL-018] |

    | RS_CORR_INSERT | Transport registration in deserializers |

    | SAPGUI_PROGRESS_INDICATOR | Progress bar |


    ### Classes

    | Class | Usage |

    |---|---|

    | CL_GUI_HTML_VIEWER (+ CL_GUI_CONTAINER) | Whole abapGit UI rendered as HTML
    on screen0 |

    | CL_GUI_FRONTEND_SERVICES | ZIP download/upload, dialogs, clipboard |

    | CL_HTTP_CLIENT / IF_HTTP_CLIENT | git HTTP(S) transport with SSL id + proxy,
    agent ''git/2.0 (abapGit 1.133.0)'' [VERIFIED: CL-016] |

    | CL_HTTP_UTILITY | URL escaping/base64 |


    ### Other

    - PERFORM set_pf_status IN PROGRAM rsdbrunt IF FOUND (standard PF-status reuse).

    - GUI status ''DETL'' borrowed from program RSPFPAR in the login popup (152514-152519).

    '
  performance: "The report shell itself does no mass data processing; performance-relevant\
    \ DB\naccess lives in the merged library and is dominated by single-record reads\
    \ on\ndictionary/directory tables.\n- Persistence census: 4 SELECTs, 1 INSERT,\
    \ 1 DELETE, 1 MODIFY, 1 UPDATE on the\n  ZABAPGIT table, one SELECT per key inside\
    \ a LOOP in list_by_keys\n  [VERIFIED: CL-008]. list() reads the entire table\
    \ without WHERE (BUG-001)\n  [VERIFIED: CL-009].\n- TADIR pattern-scan with LIKE\
    \ + post-filter loop in the SICF mapper\n  (#EC CI_GENBUFF) [VERIFIED: CL-024].\n\
    - Serialization workloads (whole-package pulls) are CPU/memory-bound in the\n\
    \  merged serializers rather than DB-bound at report level; not further profiled\n\
    \  in raw-only mode.\n"
  error_handling: "- Top-level: TRY/CATCH in FORM run converts zcx_abapgit_exception\
    \ /\n  zcx_abapgit_not_found into MESSAGE TYPE 'E'; GUI focus/back errors are\n\
    \  reported as MESSAGE TYPE 'S' DISPLAY LIKE 'E' (no dump, no log)\n  [VERIFIED:\
    \ CL-020].\n- Event routing guards: exit logic restricted to dynpro 1001, password\
    \ events\n  to dynpro 1002 (ASSERT sy-dynnr = c_dynnr in the dialog) [VERIFIED:\
    \ CL-019].\n- Persistence: INSERT asserts sy-subrc = 0; MODIFY/UPDATE raise\n\
    \  zcx_abapgit_exception on failure; DELETE deliberately ignores subrc\n  (\"\
    record might not exist\"); lock failures raise via t100\n  [VERIFIED: CL-007].\n\
    - Silent-failure spots: adjust_toolbar returns on any RPY_* error (BUG-003)\n\
    \  [VERIFIED: CL-011]; get_package_from_adt catches cx_root without handling\n\
    \  (BUG-004) [VERIFIED: CL-012].\n- No COMMIT WORK at report level; the dummy\
    \ update-task call releases locks at\n  the next commit of the calling logic [VERIFIED:\
    \ CL-007].\n"
  bug_candidates: '| ID | Severity | Type | Location | Description |

    |---|---|---|---|---|

    | BUG-001 | MINOR | PERFORMANCE | persistence_db=>list, 73200-73203 | SELECT *
    on whole ZABAPGIT table without WHERE [VERIFIED: CL-009] |

    | BUG-002 | SMELL | CORRECTNESS | persistence_db=>lock, 73190-73239 | Dynamic
    dummy update-task FM with fallback to unrelated standard FM [VERIFIED: CL-010]
    |

    | BUG-003 | MINOR | SMELL | FORM adjust_toolbar, 152904-152965 | Runtime rewrite
    of own dynpro 1001; all errors swallowed [VERIFIED: CL-011] |

    | BUG-004 | SMELL | SMELL | lcl_startup=>get_package_from_adt, 152761-152795 |
    CATCH cx_root ##NO_HANDLER swallows all errors [VERIFIED: CL-012] |

    | BUG-005 | SMELL | SECURITY | screen 1002, 152389-152409 | Password in plain
    dynpro parameter, masked only at PBO [VERIFIED: CL-013] |


    Count by severity: 0 BLOCKER, 0 MAJOR, 2 MINOR, 3 SMELL.

    Count by type: 1 PERFORMANCE, 1 CORRECTNESS, 2 SMELL, 1 SECURITY.

    All five are upstream abapGit design decisions: track upstream, do not patch

    the merged report locally.

    '
  test_coverage: 'No test class is merged into the standalone report (abapmerge strips
    them);

    ''for testing'' occurs only in two comments [VERIFIED: CL-022]. Test coverage

    exists upstream in the abapGit repository (github.com/abapGit/abapGit); local

    unit tests for this merged artifact are neither possible nor desirable - the

    correct quality lever is upgrading to the current upstream release.

    '
  business_open_questions: "1. Is ZABAPGIT_STANDALONE the productive abapGit installation\
    \ at the company,\n   or does the developer (non-standalone) version also exist?\
    \ (avoid parallel\n   persistence states on table ZABAPGIT).\n2. Who is allowed\
    \ to start abapGit? Is the authorization exit\n   (zabapgit_authorizations_exit\
    \ / ZIF_ABAPGIT_AUTH implementation,\n   152574-152577) implemented, or is startup\
    \ open to all developers?\n   [UNVERIFIABLE] (include existence requires MCP/system\
    \ check).\n3. Are any of the other user-exit includes (user exit, background exit,\
    \ GUI\n   pages exit) implemented in this system? [UNVERIFIABLE]\n4. Was DB table\
    \ ZABAPGIT created by the runtime migration in $TMP\n   [VERIFIED: CL-018] or\
    \ transported as a proper repository object? This\n   affects system copies and\
    \ disaster recovery.\n5. Is background synchronization (zcl_abapgit_background,\
    \ batch mode) scheduled\n   as a job, and with which technical user?\n6. What\
    \ is the update policy for the standalone report (version 1.133.0 built\n   2026-07-01\
    \ [VERIFIED: CL-001])? Who re-imports new releases and how often?\n7. Which git\
    \ server(s)/proxy does the system connect to (SSL id / proxy config\n   are runtime\
    \ settings, not visible in code) [UNVERIFIABLE]?\n"
