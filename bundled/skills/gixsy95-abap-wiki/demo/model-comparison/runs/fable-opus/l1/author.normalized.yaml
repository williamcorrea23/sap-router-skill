bug_candidates:
- id: BUG-001
  severity: MINOR
  type: PERFORMANCE
  location: zcl_abapgit_persistence_db=>list, lines 73200-73203
  description: 'SELECT * FROM (c_tabname) INTO TABLE rt_content without any WHERE
    clause: loads every persisted entry (repo metadata, settings, checksums - data_str
    is an unbounded STRG blob) into memory in one shot.'
  fix_proposed: Upstream design (table is normally small); if the DB-utility page
    becomes slow on systems with many/large repos, restrict by type or paginate. Do
    not patch locally - report upstream.
- id: BUG-002
  severity: SMELL
  type: CORRECTNESS
  location: zcl_abapgit_persistence_db=>get_update_function / lock, lines 73190-73197
    and 73235-73239
  description: Lock release relies on a dynamic dummy CALL FUNCTION ... IN UPDATE
    TASK whose name falls back to the functionally unrelated standard FM 'BANK_OBJ_WORKL_RELEASE_LOCKS'
    when 'CALL_V1_PING' does not exist - fragile coupling to the existence and side-effect-freeness
    of standard FMs.
  fix_proposed: None locally (documented upstream trick to auto-release ENQUEUE locks
    at COMMIT); monitor after upgrades that the fallback FM still exists and stays
    side-effect free.
- id: BUG-003
  severity: MINOR
  type: SMELL
  location: FORM adjust_toolbar, lines 152904-152965 (called from INITIALIZATION at
    152968)
  description: The report rewrites the header of its own dynpro 1001 at runtime via
    RPY_DYNPRO_INSERT (toolbar toggle for variant maintenance) - a repository modification
    at program start; all errors of RPY_DYNPRO_READ/INSERT are silently ignored (RETURN
    on sy-subrc, 152927-152929 and 152961-152963).
  fix_proposed: Accept (guarded by an early RETURN when no change is required, 152936-152938),
    but be aware the program generates/modifies its own dynpro in each system where
    the toolbar flag differs.
- id: BUG-004
  severity: SMELL
  type: SMELL
  location: lcl_startup=>get_package_from_adt, lines 152761-152795
  description: 'CATCH cx_root ##NO_HANDLER swallows every exception of the dynamic
    ADT context access - any unexpected failure (not only missing ADT) is silently
    ignored.'
  fix_proposed: Narrow the catch to the expected dynamic-invocation exceptions or
    at least log the error; intentional fail-silent per inline comment, so severity
    SMELL.
- id: BUG-005
  severity: SMELL
  type: SECURITY
  location: Screen 1002 password dialog, lines 152389-152409 and 152506-152509
  description: The git password/token is captured in a plain selection-screen parameter
    p_pass TYPE c LENGTH 255 (152402); it is masked only at PBO by setting screen-invisible
    = '1' (152506-152508) and cleared after the popup (152452, 152476). The value
    transits a standard dynpro field rather than a password-typed control.
  fix_proposed: Accept for the standalone distribution (upstream design; mitigations
    present). For hardened setups prefer token-based auth and the ZCL_ABAPGIT_AUTH_EXIT
    user exit (see include hooks at 152574-152589).
