name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3.11 = minimum threshold enforced by doctor.py; 3.12 = development environment.
        python-version: [ '3.11', '3.12' ]
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (lockfile)
        run: |
          python -m pip install --upgrade pip
          pip install -r core/src/requirements.lock.txt

      - name: Check encoding
        run: python core/src/tools/check_encoding.py --check

      - name: Check context headers
        run: python core/src/tools/check_headers.py --check

      - name: Secret scan (fail-closed)
        run: python core/src/tools/doctor.py --secret-scan

      - name: Check agent sync
        run: python core/src/tools/sync_agents.py --check

      - name: Check slice registry
        run: python core/src/tools/pipeline.py slices-registry --check

      - name: Lint vault template
        run: python core/src/tools/lint_wiki.py --check

      - name: Doctor (WARN on missing DB = expected on clone)
        run: python core/src/tools/doctor.py

      - name: Ruff (lint + format check)
        run: |
          pip install ruff==0.15.20
          ruff check .
          ruff format --check .

      - name: Unit test
        run: python -m pytest core/src/test/unit_tests -q

      # The advertised no-SAP quick-start must keep working verbatim.
      - name: Demo (no-SAP L0 end-to-end)
        run: python core/src/tools/demo.py --workspace output/demo/ci

  coverage:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r core/src/requirements-dev.txt
      - name: Coverage (informational, non-blocking)
        continue-on-error: true
        run: python -m pytest core/src/test/unit_tests --cov=core/src/tools --cov-report=term-missing
