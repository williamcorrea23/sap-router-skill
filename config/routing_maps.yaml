# SAP Router v5.0 — routing configuration (externalized from sap_router.py v4.2)
adt_actions:
  - read_source
  - search_object
  - syntax_check
  - where_used
  - get_deps
  - code_search

functional_write_keywords:
  - CREATE
  - CHANGE
  - POST
  - MOVEMENT
  - RECEIPT
  - DELIVERY
  - BILLING
  - INVOICE
  - CONFIRM
  - RELEASE
  - REVERSE
  - SAVE
  - UPDATE
  - CANCEL
  - PAYMENT

functional_read_keywords:
  - READ
  - DISPLAY
  - OVERVIEW
  - CHECK
  - GET
  - LIST
  - SEARCH

